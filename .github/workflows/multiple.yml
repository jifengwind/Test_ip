# =============================================================================
# CF IP Auto Select - 代理优选版（支持手动选择模式）
# =============================================================================
# 修改下面的数值即可控制整个扫描流程，无需翻找代码
# =============================================================================

name: CF IP Proxy Select (Multi-Mode)

on:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: '扫描模式'
        required: true
        type: choice
        default: 'full'
        options:
          - 'mobile'      # 仅移动线路
          - 'unicom'      # 仅联通线路
          - 'telecom'     # 仅电信线路
          - 'asia'        # 亚洲区域段
          - 'full'        # 全部代理优选段
      threads:
        description: '并发线程数'
        required: false
        type: choice
        default: '60'
        options:
          - '32'
          - '60'
          - '100'
      max_latency:
        description: '延迟上限 (ms)'
        required: false
        type: choice
        default: '300'
        options:
          - '200'
          - '300'
          - '1000'
  schedule:
    - cron: '0 18 * * *'           # 每天北京时间 02:00 执行（UTC 18:00）

env:
  # -------------------- 默认扫描配置（定时触发时使用）--------------------
  OUTPUT_N: 50000                   # CloudflareST 输出的候选 IP 数量
  MAX_LATENCY_DEFAULT: 1000          # 默认延迟上限(ms)
  THREADS_DEFAULT: 60               # 默认并发线程数
  SCAN_MODE_DEFAULT: full           # 默认扫描模式
  
  # -------------------- 结果筛选配置 --------------------
  FINAL_OUTPUT: 500                 # 最终保存到文件的最优 IP 数量
  MAX_LOSS: 3                       # 最大丢包率(%)
  
  # -------------------- 输出端口配置 --------------------
  DEFAULT_PORT: 443                 # 输出 IP 时使用的端口号
  
  # -------------------- 输出目录（独立于原脚本）--------------------
  OUTPUT_DIR: Proxy_ip              # 输出目录名

# =============================================================================
# 以下为执行逻辑，通常无需修改
# =============================================================================

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set Parameters
        id: params
        run: |
          # 判断触发方式，设置参数
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SCAN_MODE="${{ github.event.inputs.scan_mode }}"
            THREADS="${{ github.event.inputs.threads }}"
            MAX_LATENCY="${{ github.event.inputs.max_latency }}"
          else
            SCAN_MODE="${{ env.SCAN_MODE_DEFAULT }}"
            THREADS="${{ env.THREADS_DEFAULT }}"
            MAX_LATENCY="${{ env.MAX_LATENCY_DEFAULT }}"
          fi
          
          echo "SCAN_MODE=${SCAN_MODE}" >> $GITHUB_OUTPUT
          echo "THREADS=${THREADS}" >> $GITHUB_OUTPUT
          echo "MAX_LATENCY=${MAX_LATENCY}" >> $GITHUB_OUTPUT
          
          echo "=== 运行参数 ==="
          echo "触发方式: ${{ github.event_name }}"
          echo "扫描模式: ${SCAN_MODE}"
          echo "线程数: ${THREADS}"
          echo "延迟上限: ${MAX_LATENCY} ms"
          echo "输出目录: ${{ env.OUTPUT_DIR }}"
          echo "================"

      - name: Create Output Directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Download CloudflareST
        run: |
          echo "=== 下载 CloudflareSpeedTest ==="
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST
          echo "✅ 下载完成"

      - name: Prepare CIDR by Mode
        run: |
          echo "=== 根据模式 [${{ steps.params.outputs.SCAN_MODE }}] 准备 CIDR 列表 ==="
          
          python3 << EOF
          import os

          SCAN_MODE = "${{ steps.params.outputs.SCAN_MODE }}"

          # 各线路 CIDR 定义
          MOBILE_CIDRS = [
              "104.16.0.0/13",
              "104.18.0.0/16",
              "104.19.0.0/16",
              "104.28.0.0/14",
          ]

          UNICOM_CIDRS = [
              "172.64.0.0/13",
              "104.23.240.0/20",
              "104.31.0.0/16",
          ]

          TELECOM_CIDRS = [
              "162.159.208.0/20",
              "162.159.224.0/20",
              "104.20.0.0/16",
              "104.22.0.0/16",
          ]

          ASIA_CIDRS = [
              "104.24.0.0/14",
              "141.101.64.0/18",
              "104.16.0.0/13",
              "172.64.0.0/13",
          ]

          # 根据模式选择 CIDR
          if SCAN_MODE == "mobile":
              cidrs = MOBILE_CIDRS
          elif SCAN_MODE == "unicom":
              cidrs = UNICOM_CIDRS
          elif SCAN_MODE == "telecom":
              cidrs = TELECOM_CIDRS
          elif SCAN_MODE == "asia":
              cidrs = ASIA_CIDRS
          else:  # full
              cidrs = MOBILE_CIDRS + UNICOM_CIDRS + TELECOM_CIDRS + ASIA_CIDRS

          # 去重
          cidrs = list(set(cidrs))

          with open('proxy_cidr.txt', 'w') as f:
              for c in cidrs:
                  f.write(c + '\n')

          print(f"模式: {SCAN_MODE}")
          print(f"CIDR 段数量: {len(cidrs)}")
          for c in cidrs:
              print(f"  - {c}")
          EOF
          
          echo ""
          echo "=== 展开 CIDR 生成 IP 列表 ==="
          
          python3 << EOF
          import ipaddress

          MAX_PER_CIDR = 50000  # 每 CIDR 最多取 IP 数

          cidrs = []
          with open('proxy_cidr.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      try:
                          cidrs.append(ipaddress.ip_network(line, strict=False))
                      except:
                          pass

          all_ips = []
          for net in cidrs:
              ips = [str(ip) for ip in net.hosts()]
              if len(ips) > MAX_PER_CIDR:
                  step = len(ips) // MAX_PER_CIDR
                  ips = ips[::step][:MAX_PER_CIDR]
              all_ips.extend(ips)
              print(f"  {net} -> 采样 {len(ips)} 个 IP")

          with open('all_ips.txt', 'w') as f:
              for ip in all_ips:
                  f.write(ip + '\n')

          print(f"\n实际生成 IP 数量: {len(all_ips)}")
          EOF
          
          echo ""
          echo "待扫描 IP 数量: $(wc -l < all_ips.txt)"

      - name: Run CloudflareST - Delay Test
        run: |
          echo "=== 延迟测速 (HTTPing 模式) ==="
          echo "配置: 候选数=${{ env.OUTPUT_N }} | 延迟上限=${{ steps.params.outputs.MAX_LATENCY }}ms | 线程=${{ steps.params.outputs.THREADS }}"
          
          ./CloudflareST \
            -f all_ips.txt \
            -n ${{ env.OUTPUT_N }} \
            -t ${{ steps.params.outputs.THREADS }} \
            -tl ${{ steps.params.outputs.MAX_LATENCY }} \
            -httping \
            -dd
          
          if [ ! -f result.csv ]; then
            echo "❌ 未生成结果文件"
            exit 1
          fi
          
          echo ""
          echo "=== 测速完成，前 10 个结果 ==="
          head -11 result.csv | column -t -s ','

      - name: Process Results - Generate Top IPs
        run: |
          MODE="${{ steps.params.outputs.SCAN_MODE }}"
          echo "=== 处理结果，生成优选 IP (模式: ${MODE}) ==="
          echo "配置: 最终输出=${{ env.FINAL_OUTPUT }} | 最大丢包=${{ env.MAX_LOSS }}%"
          
          cat > process_result.py << EOF
          import csv
          import os

          DEFAULT_PORT = "${{ env.DEFAULT_PORT }}"
          OUTPUT_COUNT = ${{ env.FINAL_OUTPUT }}
          MAX_LOSS = ${{ env.MAX_LOSS }}
          OUTPUT_DIR = "${{ env.OUTPUT_DIR }}"
          SCAN_MODE = "${MODE}"

          def detect_isp(ip):
              if ip.startswith('104.16') or ip.startswith('104.18') or \
                 ip.startswith('104.19') or ip.startswith('104.28'):
                  return '移动'
              if ip.startswith('172.64') or ip.startswith('172.67') or \
                 ip.startswith('104.23') or ip.startswith('104.31'):
                  return '联通'
              if ip.startswith('162.159') or ip.startswith('104.20') or \
                 ip.startswith('104.22'):
                  return '电信'
              return '多线'

          if not os.path.exists('result.csv'):
              print("❌ 未找到 result.csv")
              exit(1)

          results = []
          with open('result.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  ip = row.get('IP 地址', '').strip()
                  if not ip:
                      continue
                  
                  try:
                      latency = float(row.get('平均延迟', '0').strip() or '0')
                  except:
                      latency = 0
                  
                  try:
                      loss_str = row.get('丢包率', '0').strip().rstrip('%')
                      loss = float(loss_str) if loss_str else 0
                  except:
                      loss = 0
                  
                  if loss > MAX_LOSS:
                      continue
                  
                  isp = detect_isp(ip)
                  
                  results.append({
                      'ip': ip,
                      'latency': latency,
                      'loss': loss,
                      'isp': isp
                  })

          print(f"读取到 {len(results)} 个有效 IP")

          if len(results) == 0:
              print("❌ 没有符合条件的 IP")
              with open(f'{OUTPUT_DIR}/best_ip_{SCAN_MODE}.txt', 'w') as f:
                  f.write("# No IPs found\n")
              with open(f'{OUTPUT_DIR}/result_IP_{SCAN_MODE}.txt', 'w') as f:
                  f.write("# No IPs found\n")
              exit(0)

          results.sort(key=lambda x: x['latency'])
          top_results = results[:OUTPUT_COUNT]

          print("")
          print(f"=== 最终前 {OUTPUT_COUNT} 个 IP (模式: {SCAN_MODE}) ===")
          print(f"{'排名':<4} {'IP地址':<18} {'运营商':<6} {'延迟(ms)':<10}")
          print("-" * 50)

          for i, r in enumerate(top_results, 1):
              print(f"{i:<4} {r['ip']:<18} {r['isp']:<6} {r['latency']:<10.1f}")

          stats = {'电信': 0, '联通': 0, '移动': 0, '多线': 0}
          for r in top_results:
              stats[r['isp']] += 1
          
          print("")
          print("=== 运营商分布 ===")
          for isp, count in stats.items():
              if count > 0:
                  print(f"  {isp}: {count}")

          # 保存文件（带模式后缀）
          with open(f'{OUTPUT_DIR}/best_ip_{SCAN_MODE}.txt', 'w') as f:
              for r in top_results:
                  f.write(f"{r['ip']}\n")

          with open(f'{OUTPUT_DIR}/result_IP_{SCAN_MODE}.txt', 'w') as f:
              for r in top_results:
                  f.write(f"{r['ip']}:{DEFAULT_PORT}#{r['isp']}\n")

          with open(f'{OUTPUT_DIR}/result_{SCAN_MODE}.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['IP 地址', '端口', '运营商', '延迟(ms)', '丢包率(%)'])
              for r in top_results:
                  writer.writerow([r['ip'], DEFAULT_PORT, r['isp'], f"{r['latency']:.1f}", f"{r['loss']:.1f}"])

          # 同时保存一份 latest（覆盖）
          with open(f'{OUTPUT_DIR}/best_ip_latest.txt', 'w') as f:
              for r in top_results:
                  f.write(f"{r['ip']}\n")

          with open(f'{OUTPUT_DIR}/result_IP_latest.txt', 'w') as f:
              for r in top_results:
                  f.write(f"{r['ip']}:{DEFAULT_PORT}#{r['isp']}\n")

          print("")
          print(f"✅ 已保存结果到 {OUTPUT_DIR} 目录")
          EOF
          
          python3 process_result.py
          
          echo ""
          echo "=== 追踪 Cloudflare 边缘节点位置 ==="
          curl -s https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep loc || echo "loc=unknown"

      - name: Show Results
        run: |
          MODE="${{ steps.params.outputs.SCAN_MODE }}"
          echo ""
          echo "=========================================="
          echo "📁 ${{ env.OUTPUT_DIR }} 目录内容"
          echo "=========================================="
          ls -la ${{ env.OUTPUT_DIR }}/ || echo "目录为空"
          echo ""
          
          if [ -f ${{ env.OUTPUT_DIR }}/result_IP_${MODE}.txt ]; then
            echo "=========================================="
            echo "📄 result_IP_${MODE}.txt 内容"
            echo "=========================================="
            cat ${{ env.OUTPUT_DIR }}/result_IP_${MODE}.txt
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add ${{ env.OUTPUT_DIR }}/
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            MODE="${{ steps.params.outputs.SCAN_MODE }}"
            git commit -m "Update CF proxy IPs [${MODE}] - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已推送到仓库"
          fi

      - name: Upload Artifacts (备用)
        uses: actions/upload-artifact@v4
        with:
          name: cf-proxy-ips-${{ steps.params.outputs.SCAN_MODE }}
          path: ${{ env.OUTPUT_DIR }}/
