# =============================================================================
# CF IP Auto Select - 精简优化版
# =============================================================================
# 特性：
#   ✅ 全量 HTTPing 测速，保证准确性
#   ✅ 多端口并行测试，自动选择最佳端口
#   ✅ 运营商智能识别
#   ✅ 仅输出 3 种格式：best_ip.txt / result_IP.txt / result.csv
#   ✅ 结果自动提交 + Artifact 双备份
# =============================================================================

name: CF IP Auto Select

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'           # 每天北京时间 02:00 执行

env:
  # -------------------- 抽样配置 --------------------
  SAMPLE_SIZE: 2500000               # 从 CIDR 中随机抽取的 IP 数量
  BATCH_SIZE: 500000                 # 每批测试的 IP 数量
  
  # -------------------- 延迟测试配置 --------------------
  OUTPUT_N: 6000                     # 每个端口的 CloudflareST 输出数量
  THREADS: 100                       # 并发线程数
  MAX_LATENCY: 500                   # 延迟上限(ms)
  
  # -------------------- 结果筛选配置 --------------------
  FINAL_OUTPUT: 2000                 # 最终保存的 IP 数量
  MAX_LOSS: 5                        # 最大丢包率(%)
  
  # -------------------- 端口配置 --------------------
  PORTS: "443 8443 2053 2083"       # 测试端口列表
  DEFAULT_PORT: 443                  # 输出时使用的默认端口

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Output Directory
        run: mkdir -p Test_ip

      # ===============================
      # 下载 CloudflareST
      # ===============================
      - name: Download CloudflareST
        run: |
          echo "=== 下载 CloudflareSpeedTest ==="
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST
          echo "✅ CloudflareST 下载完成"

      # ===============================
      # 准备 CIDR 列表
      # ===============================
      - name: Prepare CIDR
        run: |
          echo "=== 准备 CIDR 列表 ==="
          
          if [ -f ipv4cidr.txt ]; then
            echo "✅ 使用本地 ipv4cidr.txt"
            cp ipv4cidr.txt all_cidr.txt
          else
            echo "⚠️ 未找到 ipv4cidr.txt，使用官方 CIDR"
            curl -s https://www.cloudflare.com/ips-v4/ -o all_cidr.txt
          fi
          
          echo "CIDR 段数量: $(wc -l < all_cidr.txt)"

      # ===============================
      # 从 CIDR 中抽样 IPv4
      # ===============================
      - name: Sample IPv4 from CIDR
        run: |
          echo "=== 从 CIDR 中随机抽取 ${{ env.SAMPLE_SIZE }} 个 IPv4 ==="
          
          python3 << 'EOF'
          import ipaddress
          import random
          import os
          
          SAMPLE_SIZE = int(os.environ.get('SAMPLE_SIZE', 2500000))
          
          # 读取并解析 CIDR
          cidrs = []
          with open('all_cidr.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      try:
                          net = ipaddress.ip_network(line, strict=False)
                          if net.num_addresses > 2 and net.version == 4:
                              cidrs.append(net)
                      except:
                          pass
          
          print(f"有效 IPv4 CIDR 段: {len(cidrs)}")
          
          # 计算权重（按地址数量，限制最大值避免单段权重过高）
          weights = [min(net.num_addresses, 1000000) for net in cidrs]
          total_weight = sum(weights)
          print(f"总权重: {total_weight:,}")
          
          # 抽样
          sample_ips = set()
          max_attempts = SAMPLE_SIZE * 10
          attempts = 0
          
          while len(sample_ips) < SAMPLE_SIZE and attempts < max_attempts:
              net = random.choices(cidrs, weights=weights, k=1)[0]
              ip_int = random.randint(1, min(net.num_addresses - 2, 100000))
              sample_ips.add(str(net[ip_int]))
              attempts += 1
          
          # 保存全部 IP
          with open('all_ips.txt', 'w') as f:
              for ip in sample_ips:
                  f.write(ip + '\n')
          
          print(f"实际抽样: {len(sample_ips):,} 个 IPv4")
          EOF
          
          echo "待测试 IP 总数: $(wc -l < all_ips.txt)"

      # ===============================
      # 分批 HTTPing 测试（多端口）
      # ===============================
      - name: Batch HTTPing Test
        run: |
          echo "=== 分批多端口 HTTPing 测试 ==="
          echo "配置: 批次大小=${{ env.BATCH_SIZE }} | 每端口输出=${{ env.OUTPUT_N }}"
          echo "延迟上限=${{ env.MAX_LATENCY }}ms | 线程=${{ env.THREADS }}"
          
          # 清空汇总文件
          > all_results.csv
          
          # 分批处理
          split -l ${{ env.BATCH_SIZE }} all_ips.txt batch_
          
          batch_num=1
          for batch_file in batch_*; do
            echo ""
            echo "=========================================="
            echo "处理批次 $batch_num: $batch_file ($(wc -l < $batch_file) 个 IP)"
            echo "=========================================="
            
            for port in ${{ env.PORTS }}; do
              echo "  [端口 $port] 测试中..."
              
              # 使用 timeout 防止卡死
              timeout 300 ./CloudflareST \
                -f "$batch_file" \
                -n ${{ env.OUTPUT_N }} \
                -t ${{ env.THREADS }} \
                -tl ${{ env.MAX_LATENCY }} \
                -httping \
                -dd \
                -sl 5 \
                -p "$port" 2>&1 | grep -E "(IP 地址|完成|结果)" || true
              
              if [ -f result.csv ]; then
                # 添加端口列
                if [ ! -s all_results.csv ]; then
                  head -1 result.csv | sed 's/$/,测试端口/' > all_results.csv
                fi
                tail -n +2 result.csv | awk -v p="$port" '{print $0 "," p}' >> all_results.csv
                echo "  [端口 $port] ✅ 完成，有效结果 $(tail -n +2 result.csv | wc -l) 条"
                rm -f result.csv
              else
                echo "  [端口 $port] ⚠️ 无结果"
              fi
            done
            
            rm -f "$batch_file"
            batch_num=$((batch_num + 1))
          done
          
          echo ""
          total_results=$(tail -n +2 all_results.csv 2>/dev/null | wc -l)
          echo "汇总结果总数: $total_results 条"
          
          if [ "$total_results" -eq 0 ]; then
            echo "❌ 错误：没有获取到任何有效结果"
            exit 1
          fi

      # ===============================
      # 结果融合与排序
      # ===============================
      - name: Process and Merge Results
        run: |
          echo "=== 多端口结果融合 ==="
          echo "配置: 最终输出=${{ env.FINAL_OUTPUT }} | 最大丢包=${{ env.MAX_LOSS }}%"
          
          python3 << 'EOF'
          import csv
          import os
          from collections import defaultdict
          
          FINAL_OUTPUT = int(os.environ.get('FINAL_OUTPUT', 2000))
          MAX_LOSS = float(os.environ.get('MAX_LOSS', 5))
          DEFAULT_PORT = os.environ.get('DEFAULT_PORT', '443')
          
          # ===============================
          # 运营商识别
          # ===============================
          def detect_isp(ip):
              """根据 IP 段智能识别运营商"""
              parts = ip.split('.')
              if len(parts) != 4:
                  return '未知'
              
              first = parts[0]
              second = parts[1]
              
              # 移动常见段
              if (first == '104' and second in ['16', '17', '18', '19', '28']):
                  return '移动'
              
              # 联通常见段
              if (first == '172' and second in ['64', '67', '68']) or \
                 (first == '104' and second in ['23', '31']) or \
                 (first == '141' and second == '101'):
                  return '联通'
              
              # 电信常见段
              if (first == '104' and second in ['20', '22', '24', '25', '26', '27']) or \
                 (first == '172' and second in ['65', '66']) or \
                 (first == '162' and second == '159'):
                  return '电信'
              
              # 扩展识别
              if ip.startswith('104.16') or ip.startswith('104.17'):
                  return '移动'
              if ip.startswith('172.64') or ip.startswith('104.23'):
                  return '联通'
              if ip.startswith('104.20') or ip.startswith('162.159'):
                  return '电信'
              
              return '多线'
          
          # ===============================
          # 读取所有测试结果
          # ===============================
          if not os.path.exists('all_results.csv') or os.path.getsize('all_results.csv') == 0:
              print("❌ 没有测试结果")
              exit(1)
          
          # IP -> {port: {'delay': x, 'loss': y}}
          ip_results = defaultdict(dict)
          
          with open('all_results.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              total_rows = 0
              
              for row in reader:
                  total_rows += 1
                  try:
                      ip = row.get('IP 地址', '').strip()
                      if not ip:
                          continue
                      
                      delay = float(row.get('平均延迟', '0').strip() or '0')
                      if delay <= 0:
                          continue
                      
                      loss_str = row.get('丢包率', '0').strip().rstrip('%')
                      loss = float(loss_str) if loss_str else 0
                      
                      if loss > MAX_LOSS:
                          continue
                      
                      port = row.get('测试端口', '').strip()
                      if not port:
                          port = row.get('端口', DEFAULT_PORT).strip()
                      
                      ip_results[ip][port] = {'delay': delay, 'loss': loss}
                  except:
                      continue
          
          print(f"读取总行数: {total_rows}")
          print(f"去重后 IP 数量: {len(ip_results)}")
          
          # ===============================
          # 计算每个 IP 的综合得分
          # ===============================
          def calculate_score(delay, loss):
              """综合得分：延迟 + 丢包惩罚"""
              return delay * (1 + loss / 100)
          
          final_results = []
          
          for ip, ports_data in ip_results.items():
              best_port = None
              best_score = float('inf')
              best_delay = 0
              best_loss = 0
              
              for port, metrics in ports_data.items():
                  score = calculate_score(metrics['delay'], metrics['loss'])
                  if score < best_score:
                      best_score = score
                      best_port = port
                      best_delay = metrics['delay']
                      best_loss = metrics['loss']
              
              final_results.append({
                  'ip': ip,
                  'best_port': best_port,
                  'delay': best_delay,
                  'loss': best_loss,
                  'score': best_score,
                  'isp': detect_isp(ip)
              })
          
          # 按综合得分排序
          final_results.sort(key=lambda x: x['score'])
          
          # 同一 /24 网段只保留最优的一个
          filtered_results = []
          seen_subnets = set()
          
          for r in final_results:
              subnet = '.'.join(r['ip'].split('.')[:3])
              if subnet not in seen_subnets:
                  seen_subnets.add(subnet)
                  filtered_results.append(r)
              
              if len(filtered_results) >= FINAL_OUTPUT:
                  break
          
          top_results = filtered_results[:FINAL_OUTPUT]
          print(f"\n最终筛选出 {len(top_results)} 个 IP（已去重）")
          
          # ===============================
          # 显示结果
          # ===============================
          print("\n" + "=" * 70)
          print(f"{'排名':<4} {'IP地址':<18} {'运营商':<6} {'最佳端口':<6} {'延迟(ms)':<10} {'丢包%':<6}")
          print("-" * 70)
          
          for i, r in enumerate(top_results[:30], 1):
              print(f"{i:<4} {r['ip']:<18} {r['isp']:<6} {r['best_port']:<6} {r['delay']:<10.1f} {r['loss']:<6.1f}")
          
          if len(top_results) > 30:
              print(f"... 共 {len(top_results)} 条，仅显示前 30")
          
          # ===============================
          # 统计信息
          # ===============================
          stats = defaultdict(int)
          port_stats = defaultdict(int)
          delay_sum = 0
          
          for r in top_results:
              stats[r['isp']] += 1
              port_stats[r['best_port']] += 1
              delay_sum += r['delay']
          
          print("\n=== 运营商分布 ===")
          for isp, count in sorted(stats.items(), key=lambda x: -x[1]):
              pct = count / len(top_results) * 100
              print(f"  {isp}: {count} ({pct:.1f}%)")
          
          print("\n=== 最佳端口分布 ===")
          for port, count in sorted(port_stats.items(), key=lambda x: -x[1]):
              pct = count / len(top_results) * 100
              print(f"  端口 {port}: {count} ({pct:.1f}%)")
          
          print(f"\n=== 延迟统计 ===")
          print(f"  平均延迟: {delay_sum / len(top_results):.1f} ms")
          print(f"  最低延迟: {top_results[0]['delay']:.1f} ms")
          print(f"  最高延迟: {top_results[-1]['delay']:.1f} ms")
          
          # ===============================
          # 保存结果文件（仅 3 种格式）
          # ===============================
          
          # 1. best_ip.txt - 纯 IP 列表
          with open('Test_ip/best_ip.txt', 'w') as f:
              for r in top_results:
                  f.write(f"{r['ip']}\n")
          
          # 2. result_IP.txt - IP:端口#运营商
          with open('Test_ip/result_IP.txt', 'w') as f:
              for r in top_results:
                  f.write(f"{r['ip']}:{r['best_port']}#{r['isp']}\n")
          
          # 3. result.csv - 详细数据
          with open('Test_ip/result.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['排名', 'IP地址', '最佳端口', '运营商', '延迟(ms)', '丢包率(%)', '综合得分'])
              for i, r in enumerate(top_results, 1):
                  writer.writerow([
                      i, r['ip'], r['best_port'], r['isp'], 
                      f"{r['delay']:.1f}", f"{r['loss']:.1f}", f"{r['score']:.2f}"
                  ])
          
          print("\n✅ 结果已保存到 Test_ip 目录:")
          print("  - best_ip.txt: 纯 IP 列表")
          print("  - result_IP.txt: IP:端口#运营商")
          print("  - result.csv: 详细数据表格")
          EOF

      # ===============================
      # 显示结果预览
      # ===============================
      - name: Show Results Preview
        run: |
          echo ""
          echo "=========================================="
          echo "📁 Test_ip 目录内容"
          echo "=========================================="
          ls -lh Test_ip/
          echo ""
          
          if [ -f Test_ip/result_IP.txt ]; then
            echo "=========================================="
            echo "📄 前 20 个优选 IP"
            echo "=========================================="
            head -20 Test_ip/result_IP.txt
          fi

      # ===============================
      # 提交到仓库
      # ===============================
      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Test_ip/ -f
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            COMMIT_COUNT=$(wc -l < Test_ip/result_IP.txt 2>/dev/null || echo 0)
            git commit -m "🔄 Update $COMMIT_COUNT CF preferred IPs - $TIMESTAMP"
            git push
            echo "✅ 已推送到仓库"
          fi

      # ===============================
      # 上传 Artifact（备用）
      # ===============================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-results
          path: Test_ip/
          retention-days: 7

      # ===============================
      # 清理临时文件
      # ===============================
      - name: Cleanup
        if: always()
        run: |
          rm -f CloudflareST
          rm -f all_ips.txt all_cidr.txt all_results.csv
          rm -f batch_* 2>/dev/null || true
          echo "✅ 清理完成"
