name: CF IP Auto Select (Stable)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Test_ip Directory
        run: mkdir -p Test_ip

      - name: Download CloudflareST
        run: |
          echo "=== 下载 CloudflareSpeedTest ==="
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST
          echo "✅ 下载完成"

      - name: Prepare and Clean CIDR File
        run: |
          echo "=== 准备并清理 CIDR 文件 ==="
          
          # 下载官方列表
          wget -q https://www.cloudflare.com/ips-v4/ -O official_cidr.txt
          echo "官方 CIDR: $(wc -l < official_cidr.txt)"
          
          # 合并并清理
          cat > clean_cidr.py << 'EOF'
          import ipaddress
          
          valid_cidrs = set()
          invalid_count = 0
          
          # 读取官方列表
          with open('official_cidr.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  try:
                      net = ipaddress.ip_network(line, strict=False)
                      valid_cidrs.add(str(net))
                  except:
                      invalid_count += 1
          
          # 读取你的列表（如果存在）
          try:
              with open('ipv4cidr.txt', 'r') as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith('#'):
                          continue
                      try:
                          net = ipaddress.ip_network(line, strict=False)
                          valid_cidrs.add(str(net))
                      except:
                          invalid_count += 1
          except FileNotFoundError:
              pass
          
          # 写入清理后的文件
          with open('all_cidr_clean.txt', 'w') as f:
              for cidr in sorted(valid_cidrs):
                  f.write(cidr + '\n')
          
          print(f"✅ 有效 CIDR: {len(valid_cidrs)}")
          print(f"❌ 无效 CIDR: {invalid_count}")
          EOF
          
          python3 clean_cidr.py
          
          echo "清理后 CIDR 数量: $(wc -l < all_cidr_clean.txt)"
          
          # 随机采样 2000 个，加速扫描
          shuf -n 2000 all_cidr_clean.txt > all_cidr.txt 2>/dev/null || cp all_cidr_clean.txt all_cidr.txt
          echo "采样后 CIDR 数量: $(wc -l < all_cidr.txt)"
          
          if [ ! -s all_cidr.txt ]; then
            echo "❌ 没有有效的 CIDR"
            exit 1
          fi
          
          echo ""
          echo "=== 预览前 5 行 ==="
          head -5 all_cidr.txt

      - name: Run CloudflareST - Delay Test
        run: |
          echo "=== 延迟测速（取前 30 个） ==="
          
          ./CloudflareST \
            -f all_cidr.txt \
            -n 30 \
            -t 8 \
            -tl 500 \
            -sl 5 \
            -dn 0
          
          if [ ! -f result.csv ]; then
            echo "❌ 未生成结果文件"
            exit 1
          fi
          
          echo ""
          echo "=== 测速完成 ==="
          head -11 result.csv | column -t -s ','

      - name: Process Results - Generate Top 20
        run: |
          echo "=== 处理结果，生成前 20 个 IP ==="
          
          cat > process_result.py << 'EOF'
          import csv
          import os
          
          DEFAULT_PORT = "443"
          
          if not os.path.exists('result.csv'):
              print("❌ 未找到 result.csv")
              exit(1)
          
          results = []
          with open('result.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  ip = row.get('IP 地址', '').strip()
                  if not ip:
                      continue
                  
                  try:
                      latency = float(row.get('平均延迟', '0').strip() or '0')
                  except:
                      latency = 0
                  
                  try:
                      loss_str = row.get('丢包率', '0').strip().rstrip('%')
                      loss = float(loss_str) if loss_str else 0
                  except:
                      loss = 0
                  
                  results.append({
                      'ip': ip,
                      'latency': latency,
                      'loss': loss
                  })
          
          print(f"读取到 {len(results)} 个 IP")
          
          if len(results) == 0:
              print("❌ 没有符合条件的 IP")
              with open('Test_ip/best_20.txt', 'w') as f:
                  f.write("# No IPs found\n")
              with open('Test_ip/result_IP.txt', 'w') as f:
                  f.write("# No IPs found\n")
              with open('Test_ip/result.csv', 'w') as f:
                  f.write("IP 地址,端口,延迟(ms),丢包率(%)\n")
              exit(0)
          
          # 按延迟升序
          results.sort(key=lambda x: x['latency'])
          top20 = results[:20]
          
          print("")
          print("=== 最终前 20 个 IP ===")
          print(f"{'排名':<4} {'IP地址':<18} {'延迟(ms)':<10} {'丢包率(%)':<10}")
          print("-" * 50)
          
          for i, r in enumerate(top20, 1):
              print(f"{i:<4} {r['ip']:<18} {r['latency']:<10.1f} {r['loss']:<10.1f}")
          
          # 保存 best_20.txt
          with open('Test_ip/best_20.txt', 'w') as f:
              for r in top20:
                  f.write(f"{r['ip']}\n")
          
          # 保存 result_IP.txt
          with open('Test_ip/result_IP.txt', 'w') as f:
              for r in top20:
                  f.write(f"{r['ip']}:{DEFAULT_PORT}#Cloudflare优选-{r['latency']:.0f}ms\n")
          
          # 保存 result.csv
          with open('Test_ip/result.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['IP 地址', '端口', '延迟(ms)', '丢包率(%)'])
              for r in top20:
                  writer.writerow([r['ip'], DEFAULT_PORT, f"{r['latency']:.1f}", f"{r['loss']:.1f}"])
          
          print("")
          print(f"✅ 已保存前 20 个 IP 到 Test_ip 目录")
          EOF
          
          python3 process_result.py

      - name: Show Results
        run: |
          echo ""
          echo "=========================================="
          echo "📁 Test_ip 目录内容"
          echo "=========================================="
          ls -la Test_ip/ || echo "目录为空"
          echo ""
          
          if [ -f Test_ip/result_IP.txt ]; then
            echo "=========================================="
            echo "📄 result_IP.txt 内容预览"
            echo "=========================================="
            head -10 Test_ip/result_IP.txt
          fi
          
          if [ -f Test_ip/best_20.txt ]; then
            echo ""
            echo "=========================================="
            echo "📄 best_20.txt 内容预览"
            echo "=========================================="
            head -10 Test_ip/best_20.txt
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Test_ip/
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "Update CF preferred IPs - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已推送到仓库"
          fi

      - name: Upload Artifacts (备用)
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-results
          path: Test_ip/
