name: CF IP Auto Select (Final Stable)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Test_ip Directory
        run: mkdir -p Test_ip

      - name: Download CloudflareST
        run: |
          echo "=== 下载 CloudflareSpeedTest ==="
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST
          echo "✅ 下载完成"

      - name: Prepare IP List
        run: |
          echo "=== 准备 IP 列表 ==="
          
          # 检查是否存在展开后的 IP 文件
          if [ -f iplist_full.txt ]; then
            echo "✅ 使用本地 iplist_full.txt"
            cp iplist_full.txt all_ips_raw.txt
          else
            echo "⚠️ 未找到 iplist_full.txt，从官方 CIDR 生成"
            wget -q https://www.cloudflare.com/ips-v4/ -O official_cidr.txt
            
            if [ -f ipv4cidr.txt ]; then
              cat official_cidr.txt ipv4cidr.txt > all_cidr.txt
            else
              cp official_cidr.txt all_cidr.txt
            fi
            
            echo "CIDR 数量: $(wc -l < all_cidr.txt)"
            cp all_cidr.txt all_ips_raw.txt
          fi
          
          echo "原始 IP/段 数量: $(wc -l < all_ips_raw.txt)"

      - name: Sample IPs for Speed
        run: |
          echo "=== 随机采样加速 ==="
          
          # 随机采样 3000 个，保证 1 分钟内扫完
          shuf -n 8000 all_ips_raw.txt > all_ips.txt 2>/dev/null || head -8000 all_ips_raw.txt > all_ips.txt
          
          echo "采样后待扫描数量: $(wc -l < all_ips.txt)"

      - name: Run CloudflareST - Delay Test
        run: |
          echo "=== 延迟测速 (HTTPing 模式) ==="
          
          ./CloudflareST \
            -f all_ips.txt \
            -n 200 \
            -t 32 \
            -tl 500 \
            -httping \
            -dd
          
          if [ ! -f result.csv ]; then
            echo "❌ 未生成结果文件"
            exit 1
          fi
          
          echo ""
          echo "=== 测速完成，前 10 个结果 ==="
          head -11 result.csv | column -t -s ','

      - name: Process Results - Generate Top 40
        run: |
          echo "=== 处理结果，生成前 40 个 IP ==="
          
          cat > process_result.py << 'EOF'
          import csv
          import os

          DEFAULT_PORT = "443"

          def detect_isp(ip):
              """根据 IP 前缀判断运营商"""
              if ip.startswith('104.16') or ip.startswith('104.18') or \
                 ip.startswith('104.19') or ip.startswith('104.28'):
                  return '移动'
              if ip.startswith('172.64') or ip.startswith('172.67') or \
                 ip.startswith('104.23') or ip.startswith('104.31'):
                  return '联通'
              if ip.startswith('162.159') or ip.startswith('104.20') or \
                 ip.startswith('104.22'):
                  return '电信'
              return '多线'

          if not os.path.exists('result.csv'):
              print("❌ 未找到 result.csv")
              exit(1)

          results = []
          with open('result.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  ip = row.get('IP 地址', '').strip()
                  if not ip:
                      continue
                  
                  try:
                      latency = float(row.get('平均延迟', '0').strip() or '0')
                  except:
                      latency = 0
                  
                  try:
                      loss_str = row.get('丢包率', '0').strip().rstrip('%')
                      loss = float(loss_str) if loss_str else 0
                  except:
                      loss = 0
                  
                  # 丢包率 > 10% 的丢弃
                  if loss > 10:
                      continue
                  
                  isp = detect_isp(ip)
                  
                  results.append({
                      'ip': ip,
                      'latency': latency,
                      'loss': loss,
                      'isp': isp
                  })

          print(f"读取到 {len(results)} 个有效 IP")

          if len(results) == 0:
              print("❌ 没有符合条件的 IP")
              with open('Test_ip/best_40.txt', 'w') as f:
                  f.write("# No IPs found\n")
              with open('Test_ip/result_IP.txt', 'w') as f:
                  f.write("# No IPs found\n")
              exit(0)

          # 按延迟升序
          results.sort(key=lambda x: x['latency'])
          top40 = results[:40]

          print("")
          print("=== 最终前 40 个 IP ===")
          print(f"{'排名':<4} {'IP地址':<18} {'运营商':<6} {'延迟(ms)':<10}")
          print("-" * 50)

          for i, r in enumerate(top40, 1):
              print(f"{i:<4} {r['ip']:<18} {r['isp']:<6} {r['latency']:<10.1f}")

          # 统计运营商分布
          stats = {'电信': 0, '联通': 0, '移动': 0, '多线': 0}
          for r in top40:
              stats[r['isp']] += 1
          
          print("")
          print("=== 运营商分布 ===")
          for isp, count in stats.items():
              if count > 0:
                  print(f"  {isp}: {count}")

          # 保存 best_40.txt（纯 IP）
          with open('Test_ip/best_40.txt', 'w') as f:
              for r in top40:
                  f.write(f"{r['ip']}\n")

          # 保存 result_IP.txt（带端口和运营商标签）
          with open('Test_ip/result_IP.txt', 'w') as f:
              for r in top40:
                  f.write(f"{r['ip']}:{DEFAULT_PORT}#{r['isp']}优选\n")

          # 保存 result.csv
          with open('Test_ip/result.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['IP 地址', '端口', '运营商', '延迟(ms)', '丢包率(%)'])
              for r in top40:
                  writer.writerow([r['ip'], DEFAULT_PORT, r['isp'], f"{r['latency']:.1f}", f"{r['loss']:.1f}"])

          print("")
          print(f"✅ 已保存前 40 个 IP 到 Test_ip 目录")
          EOF
          
          python3 process_result.py

      - name: Show Results
        run: |
          echo ""
          echo "=========================================="
          echo "📁 Test_ip 目录内容"
          echo "=========================================="
          ls -la Test_ip/ || echo "目录为空"
          echo ""
          
          if [ -f Test_ip/result_IP.txt ]; then
            echo "=========================================="
            echo "📄 result_IP.txt 内容"
            echo "=========================================="
            cat Test_ip/result_IP.txt
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Test_ip/
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "Update CF preferred IPs - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已推送到仓库"
          fi

      - name: Upload Artifacts (备用)
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-results
          path: Test_ip/
