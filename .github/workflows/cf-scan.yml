name: CF IP Auto Select (mcis)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Test_ip Directory
        run: mkdir -p Test_ip

      - name: Download mcis
        run: |
          echo "=== 下载 Monte Carlo IP Searcher ==="
          wget -q https://github.com/Leo-Mu/montecarlo-ip-searcher/releases/download/v0.2.4/mcis-v0.2.4-linux-amd64.tar.gz
          
          if [ ! -f mcis-v0.2.4-linux-amd64.tar.gz ]; then
            echo "❌ 下载失败"
            exit 1
          fi
          
          tar -xzf mcis-v0.2.4-linux-amd64.tar.gz
          
          if [ -f mcis ]; then
            chmod +x mcis
            echo "✅ 可执行文件: mcis"
          else
            echo "❌ 未找到可执行文件 mcis"
            exit 1
          fi

      - name: Prepare CIDR File
        run: |
          echo "=== 准备 CIDR 文件 ==="
          wget -q https://www.cloudflare.com/ips-v4/ -O official_cidr.txt
          echo "官方 CIDR: $(wc -l < official_cidr.txt)"
          
          if [ -f ipv4cidr.txt ]; then
            echo "你的 CIDR: $(wc -l < ipv4cidr.txt)"
            cat official_cidr.txt ipv4cidr.txt | sort -u > all_cidr_raw.txt
          else
            cp official_cidr.txt all_cidr_raw.txt
          fi
          
          echo "合并后原始 CIDR 数量: $(wc -l < all_cidr_raw.txt)"

      - name: Validate and Clean CIDR
        run: |
          echo "=== 验证并清理 CIDR 格式 ==="
          
          cat > validate_cidr.py << 'EOF'
          import sys
          import ipaddress
          
          valid_count = 0
          invalid_count = 0
          
          with open('all_cidr_raw.txt', 'r') as f_in, open('all_cidr.txt', 'w') as f_out:
              for line in f_in:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  
                  try:
                      ipaddress.ip_network(line, strict=False)
                      f_out.write(line + '\n')
                      valid_count += 1
                  except ValueError:
                      print(f"⚠️ 无效 CIDR: {line}", file=sys.stderr)
                      invalid_count += 1
          
          print(f"✅ 有效 CIDR: {valid_count}")
          print(f"❌ 无效 CIDR: {invalid_count}")
          EOF
          
          python3 validate_cidr.py
          
          echo ""
          echo "清理后 CIDR 数量: $(wc -l < all_cidr.txt)"
          
          if [ ! -s all_cidr.txt ]; then
            echo "❌ 没有有效的 CIDR"
            exit 1
          fi

      - name: Run mcis - Smart Search
        run: |
          echo "=== mcis 智能搜索（预算: 2000 次探测） ==="
          
          COLO_LIST="HKG,TPE,NRT,KIX,ITM,FUK,ICN,SIN,BKK,HAN,SGN,MNL,CGK,KUL,RGN,PNH,BOM,DEL,MAA,BLR,HYD,CCU,SYD,MEL,BNE,PER,AKL"
          
          ./mcis \
            -cidr-file all_cidr.txt \
            -budget 2000 \
            -top 30 \
            -concurrency 100 \
            -timeout 3s \
            -host speed.cloudflare.com \
            -colo "$COLO_LIST" \
            -download-top 10 \
            -download-bytes 10485760 \
            -download-timeout 15s \
            -out jsonl \
            -out-file mcis_result.jsonl \
            -v
          
          echo ""
          echo "=== mcis 搜索完成 ==="
          
          if [ ! -f mcis_result.jsonl ]; then
            echo "❌ 未生成结果文件"
            exit 1
          fi

      - name: Process Results - Generate Top 20
        run: |
          echo "=== 处理结果，生成前 20 个 IP ==="
          
          cat > process_result.py << 'EOF'
          import json
          import csv
          import os
          
          COLO_MAP = {
              "HKG": "香港", "TPE": "台北", "NRT": "东京", "KIX": "大阪",
              "ITM": "大阪伊丹", "FUK": "福冈", "ICN": "首尔", "SIN": "新加坡",
              "BKK": "曼谷", "HAN": "河内", "SGN": "胡志明市", "MNL": "马尼拉",
              "CGK": "雅加达", "KUL": "吉隆坡", "RGN": "仰光", "PNH": "金边",
              "BOM": "孟买", "DEL": "新德里", "MAA": "金奈", "BLR": "班加罗尔",
              "HYD": "海得拉巴", "CCU": "加尔各答", "SYD": "悉尼", "MEL": "墨尔本",
              "BNE": "布里斯班", "PER": "珀斯", "AKL": "奥克兰"
          }
          
          DEFAULT_PORT = "443"
          
          results = []
          if not os.path.exists('mcis_result.jsonl'):
              print("❌ 未找到 mcis_result.jsonl")
              exit(1)
          
          with open('mcis_result.jsonl', 'r') as f:
              for line in f:
                  if line.strip():
                      results.append(json.loads(line))
          
          print(f"读取到 {len(results)} 个 IP")
          print("")
          
          if len(results) == 0:
              print("❌ 没有搜索到符合条件的 IP")
              with open('Test_ip/best_20.txt', 'w') as f:
                  f.write("# No IPs found\n")
              with open('Test_ip/result_IP.txt', 'w') as f:
                  f.write("# No IPs found\n")
              exit(0)
          
          def sort_key(r):
              if r.get('download_mbps', 0) > 0:
                  return (-r['download_mbps'], r.get('latency_ms', 999))
              else:
                  return (-999, r.get('latency_ms', 999))
          
          results.sort(key=sort_key)
          top20 = results[:20]
          
          print("=== 最终前 20 个 IP ===")
          print(f"{'排名':<4} {'IP地址':<18} {'延迟(ms)':<10} {'下载(MB/s)':<12} {'线路':<12}")
          print("-" * 65)
          
          for i, r in enumerate(top20, 1):
              ip = r.get('ip', '')
              latency = r.get('latency_ms', 0)
              download_mbps = r.get('download_mbps', 0)
              download_mbs = download_mbps / 8 if download_mbps > 0 else 0
              colo = r.get('colo', '')
              line = COLO_MAP.get(colo, colo if colo else 'Cloudflare优选')
              
              speed_str = f"{download_mbs:.1f}" if download_mbs > 0 else "-"
              print(f"{i:<4} {ip:<18} {latency:<10} {speed_str:<12} {line:<12}")
          
          with open('Test_ip/best_20.txt', 'w') as f:
              for r in top20:
                  f.write(f"{r['ip']}\n")
          
          with open('Test_ip/result_IP.txt', 'w') as f:
              for r in top20:
                  ip = r['ip']
                  latency = r.get('latency_ms', 0)
                  colo = r.get('colo', '')
                  line = COLO_MAP.get(colo, colo if colo else 'Cloudflare优选')
                  f.write(f"{ip}:{DEFAULT_PORT}#{line}-{latency}ms\n")
          
          with open('Test_ip/result.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['IP 地址', '端口', '平均延迟(ms)', '下载速度(MB/s)', '下载速度(Mbps)', '线路', '地区码'])
              for r in top20:
                  ip = r['ip']
                  latency = r.get('latency_ms', 0)
                  download_mbps = r.get('download_mbps', 0)
                  download_mbs = download_mbps / 8 if download_mbps > 0 else 0
                  colo = r.get('colo', '')
                  line = COLO_MAP.get(colo, colo if colo else 'Cloudflare优选')
                  writer.writerow([ip, DEFAULT_PORT, latency, f"{download_mbs:.2f}", f"{download_mbps:.2f}", line, colo])
          
          if top20:
              with open('Test_ip/best_ip.txt', 'w') as f:
                  f.write(f"{top20[0]['ip']}\n")
          
          print("")
          print(f"✅ 已保存前 20 个 IP 到 Test_ip 目录")
          EOF
          
          python3 process_result.py

      - name: Show Results
        run: |
          echo ""
          echo "=========================================="
          echo "📁 Test_ip 目录内容"
          echo "=========================================="
          ls -la Test_ip/ || echo "目录为空"
          echo ""
          
          if [ -f Test_ip/result_IP.txt ]; then
            echo "=========================================="
            echo "📄 result_IP.txt 内容预览"
            echo "=========================================="
            head -10 Test_ip/result_IP.txt
          fi
          
          if [ -f Test_ip/best_20.txt ]; then
            echo ""
            echo "=========================================="
            echo "📄 best_20.txt 内容预览"
            echo "=========================================="
            head -10 Test_ip/best_20.txt
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Test_ip/
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "Update CF preferred IPs (mcis) - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已推送到仓库"
          fi

      - name: Upload Artifacts (备用)
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-results
          path: Test_ip/
