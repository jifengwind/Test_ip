# =============================================================================
# CF IP 极致扫描版 - TCP 模式 (保底修正版)
# =============================================================================
# 核心修正：
#   ✅ 仅扫描 443 端口（避免非标端口被封锁）
#   ✅ 总并发降至 200（4×50，避免 PPS 限速）
#   ✅ 延迟上限放宽至 800ms
#   ✅ 丢包率上限放宽至 30%
#   ✅ 增加种子库验证和单 IP 调试
# =============================================================================

name: CF IP Extreme Scan TCP Stable

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

env:
  # -------------------- 保底修正配置 --------------------
  SAMPLE_SIZE: 150000               # 适当降低采样量
  PROCESSES: 4                      # 保持4进程
  THREADS_PER_PROCESS: 50           # 降至50，总并发200
  PING_COUNT: 2                     # 增加到2次，更准确
  MAX_LATENCY: 800                  # 放宽至800ms
  MAX_LOSS_RATE: 0.3                # 放宽至30%
  
  # -------------------- 输出配置 --------------------
  OUTPUT_PER_PROCESS: 1000          # 总计输出 4000 个候选人
  PORTS: "443"                      # 仅扫描 443 端口

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y parallel curl
          echo "✅ 环境就绪"

      - name: Create Output Directory
        run: mkdir -p Test_ip

      - name: Download CloudflareST
        run: |
          if [ ! -f CloudflareST ]; then
            wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz
            tar -xzf cfst_linux_amd64.tar.gz
            [ -f cfst ] && mv cfst CloudflareST && chmod +x CloudflareST
            rm cfst_linux_amd64.tar.gz
          fi
          echo "✅ CloudflareST 就绪"

      # ===============================
      # 调试：单 IP 连通性测试
      # ===============================
      - name: Debug Single IP Test
        run: |
          echo "=== 调试：测试 1.1.1.1:443 连通性 ==="
          echo "1.1.1.1" > test_ip.txt
          
          echo "TCP 模式测试:"
          ./CloudflareST -f test_ip.txt -n 1 -t 2 -tl 800 -tp 443 -dd 2>&1 | tail -10
          
          echo ""
          echo "curl 直接测试:"
          curl -v --connect-timeout 5 -o /dev/null -w "HTTP: %{http_code}\n" https://1.1.1.1/cdn-cgi/trace 2>&1 | head -10 || true
          
          rm -f test_ip.txt result.csv

      # ===============================
      # 构建高质量网段池
      # ===============================
      - name: Prepare High-Quality CIDR
        run: |
          echo "=== 构建高质量网段池 ==="
          
          # 1. 本地 ipv4cidr.txt (最高优先级)
          if [ -f ipv4cidr.txt ]; then
            echo "✅ 发现本地 ipv4cidr.txt"
            cp ipv4cidr.txt local.txt
          else
            touch local.txt
          fi
          
          # 2. 官方 Cloudflare IP 段
          curl -s --connect-timeout 5 https://www.cloudflare.com/ips-v4/ -o official.txt
          
          # 3. 社区对华优化段 (vfarid)
          curl -s --connect-timeout 5 https://raw.githubusercontent.com/vfarid/cf-ip-scanner/main/iplist.txt -o source1.txt || touch source1.txt
          
          # 4. 社区对华优化段 (IPDB)
          curl -s --connect-timeout 5 https://raw.githubusercontent.com/ymyuuu/IPDB/main/cloudflare.txt -o source2.txt || touch source2.txt
          
          # 合并去重
          cat local.txt official.txt source1.txt source2.txt 2>/dev/null | \
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(/[0-9]{1,2})?$' | \
            sort -u > all_cidr.txt
          
          COUNT=$(wc -l < all_cidr.txt)
          echo "✅ 种子库: ${COUNT} 个优质网段"
          echo "   本地: $(wc -l < local.txt 2>/dev/null || echo 0)"
          echo "   官方: $(wc -l < official.txt 2>/dev/null || echo 0)"
          echo "   vfarid: $(wc -l < source1.txt 2>/dev/null || echo 0)"
          echo "   IPDB: $(wc -l < source2.txt 2>/dev/null || echo 0)"
          
          echo ""
          echo "=== 种子库前10行 (验证) ==="
          head -10 all_cidr.txt
          
          rm -f local.txt official.txt source1.txt source2.txt

      # ===============================
      # 权重随机抽样
      # ===============================
      - name: Weighted Random Sampling
        run: |
          echo "=== 权重随机抽样 ==="
          
          python3 << 'EOF' > all_ips.txt
          import ipaddress
          import random
          import os

          SAMPLE_SIZE = int(os.environ.get('SAMPLE_SIZE', 150000))
          
          cidrs = []
          with open('all_cidr.txt') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      try:
                          net = ipaddress.ip_network(line, strict=False)
                          if net.num_addresses > 5:
                              cidrs.append(net)
                      except:
                          pass

          print(f"有效 CIDR 段: {len(cidrs)}", file=__import__('sys').stderr)
          
          random.shuffle(cidrs)
          total_ips = sum(net.num_addresses for net in cidrs)
          print(f"总 IP 数: {total_ips:,}", file=__import__('sys').stderr)
          
          output_ips = []

          for net in cidrs:
              num_to_sample = max(1, int(SAMPLE_SIZE * net.num_addresses / total_ips))
              if net.num_addresses > 2:
                  count = min(num_to_sample, net.num_addresses - 2)
                  indices = random.sample(range(1, net.num_addresses - 1), count)
                  for idx in indices:
                      output_ips.append(str(net[idx]))

          random.shuffle(output_ips)
          for ip in output_ips[:SAMPLE_SIZE]:
              print(ip)
          EOF
          
          echo "✅ 随机采样完成: $(wc -l < all_ips.txt) 个 IP"
          rm all_cidr.txt

      # ===============================
      # IP 列表分片
      # ===============================
      - name: Split IP List
        run: |
          echo "=== 分片 (${{ env.PROCESSES }} 进程) ==="
          split -n l/${{ env.PROCESSES }} -d -a 1 all_ips.txt ip_part_
          for f in ip_part_*; do
            echo "  $f: $(wc -l < $f) 个IP"
          done

      # ===============================
      # 多进程并行扫描 (TCP 模式 - 保底参数)
      # ===============================
      - name: Parallel TCP Scan
        run: |
          echo "=== 并行扫描 (TCP 模式 - 保底参数) ==="
          echo "进程数: ${{ env.PROCESSES }}"
          echo "总并发: $((${{ env.PROCESSES }} * ${{ env.THREADS_PER_PROCESS }}))"
          echo "延迟上限: ${{ env.MAX_LATENCY }}ms"
          echo "丢包上限: ${{ env.MAX_LOSS_RATE }}"
          echo "端口: ${{ env.PORTS }}"
          echo ""
          
          parallel -j ${{ env.PROCESSES }} '
            part={}
            echo "[进程 {}] 开始扫描 $(wc -l < $part) 个IP..."
            
            ./CloudflareST \
              -f $part \
              -n ${{ env.THREADS_PER_PROCESS }} \
              -t ${{ env.PING_COUNT }} \
              -tl ${{ env.MAX_LATENCY }} \
              -tlr ${{ env.MAX_LOSS_RATE }} \
              -tp ${{ env.PORTS }} \
              -dd \
              -p ${{ env.OUTPUT_PER_PROCESS }} \
              -o result_{}.csv 2>&1 | tail -10
            
            if [ -f result_{}.csv ] && [ $(wc -l < result_{}.csv) -gt 1 ]; then
              count=$(($(wc -l < result_{}.csv) - 1))
              echo "[进程 {}] ✅ 发现 $count 个可用IP"
              echo "[进程 {}] 前3个结果:"
              head -4 result_{}.csv | column -t -s,
            else
              echo "[进程 {}] ⚠️ 无结果"
            fi
          ' ::: ip_part_*

      # ===============================
      # 智能合并
      # ===============================
      - name: Intelligent Merge
        run: |
          echo "=== 智能合并 ==="
          
          python3 << 'EOF'
          import os
          import csv

          ip_set = set()
          ip_list = []

          for f in sorted(os.listdir('.')):
              if f.startswith('result_ip_part_') and f.endswith('.csv'):
                  print(f"处理: {f}")
                  with open(f, 'r', encoding='utf-8') as fp:
                      reader = csv.reader(fp)
                      header = next(reader, None)
                      
                      ip_idx = 0
                      if header:
                          for i, col in enumerate(header):
                              col_clean = col.strip().lower()
                              if col_clean in ['ip 地址', 'ip', 'ip地址']:
                                  ip_idx = i
                                  break
                      
                      for row in reader:
                          try:
                              ip = row[ip_idx].strip() if ip_idx < len(row) else ''
                              if ip and ip not in ip_set:
                                  ip_set.add(ip)
                                  ip_list.append(ip)
                          except:
                              pass
                  os.remove(f)

          print(f"\n✅ 去重后可用 IP: {len(ip_list)}")

          # 保存结果
          with open('Test_ip/available_ips.txt', 'w') as f:
              for ip in ip_list:
                  f.write(f"{ip}\n")
          
          with open('Test_ip/ips_443.txt', 'w') as f:
              for ip in ip_list[:5000]:
                  f.write(f"{ip}\n")

          print(f"✅ 文件已保存到 Test_ip/")
          EOF

      # ===============================
      # 显示结果摘要
      # ===============================
      - name: Show Summary
        run: |
          echo ""
          echo "=========================================="
          echo "📊 本次扫描结果"
          echo "=========================================="
          TOTAL=$(wc -l < Test_ip/available_ips.txt 2>/dev/null || echo 0)
          echo "可用 IP 数量: ${TOTAL}"
          echo ""
          
          if [ ${TOTAL} -gt 0 ]; then
            echo "前20个可用 IP:"
            head -20 Test_ip/available_ips.txt
          else
            echo "⚠️ 无可用 IP"
          fi
          
          echo ""
          ls -lh Test_ip/

      # ===============================
      # 智能提交
      # ===============================
      - name: Smart Commit
        run: |
          if [ -f Test_ip/available_ips.txt ] && [ $(wc -l < Test_ip/available_ips.txt) -gt 0 ]; then
            NEW_HASH=$(md5sum Test_ip/available_ips.txt | cut -d' ' -f1)
            OLD_HASH=$(git show HEAD:Test_ip/available_ips.txt 2>/dev/null | md5sum | cut -d' ' -f1 || echo "")
            
            if [ "$NEW_HASH" != "$OLD_HASH" ]; then
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action"
              git add Test_ip/ -f
              
              TOTAL=$(wc -l < Test_ip/available_ips.txt)
              
              git commit -m "🔄 CF可用IP [$(date +'%m-%d')] - ${TOTAL}个" || exit 0
              git push
              echo "✅ 已推送"
            else
              echo "⏭️ 无变化，跳过提交"
            fi
          else
            echo "⚠️ 无有效结果，跳过提交"
          fi

      # ===============================
      # 上传 Artifact
      # ===============================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cf-ips-tcp-${{ github.run_number }}
          path: Test_ip/
          retention-days: 5

      # ===============================
      # 清理
      # ===============================
      - name: Cleanup
        if: always()
        run: rm -f all_ips.txt CloudflareST ip_part_* *.csv

      # ===============================
      # GitHub Summary
      # ===============================
      - name: GitHub Summary
        run: |
          TOTAL=$(wc -l < Test_ip/available_ips.txt 2>/dev/null || echo 0)
          
          {
            echo "## 🚀 CF IP TCP模式扫描结果 (保底修正版)"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 扫描时间 | $(date +'%Y-%m-%d %H:%M') |"
            echo "| 扫描端口 | 443 (仅) |"
            echo "| 总并发 | $((${{ env.PROCESSES }} * ${{ env.THREADS_PER_PROCESS }})) |"
            echo "| 延迟上限 | ${{ env.MAX_LATENCY }}ms |"
            echo "| 丢包上限 | ${{ env.MAX_LOSS_RATE }} |"
            echo "| **可用IP** | **${TOTAL}** |"
            echo ""
            
            if [ ${TOTAL} -gt 0 ]; then
              echo "### 📋 深圳本地验证命令"
              echo '```bash'
              echo './CloudflareST -f ips_443.txt -n 200 -t 4 -dn 20 -o local.csv'
              echo '```'
              echo ""
              echo "### 🎯 可用IP示例"
              echo '```'
              head -15 Test_ip/available_ips.txt 2>/dev/null
              echo '```'
            else
              echo "### ⚠️ 扫描结果为 0"
              echo ""
              echo "**可能原因:**"
              echo "1. GitHub Actions 出口 IP 被 Cloudflare 完全屏蔽"
              echo "2. 需要进一步放宽参数或更换扫描平台"
            fi
          } >> $GITHUB_STEP_SUMMARY
