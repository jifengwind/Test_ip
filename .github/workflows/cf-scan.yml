name: CF IP Auto Select (mcis)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Test_ip Directory
        run: mkdir -p Test_ip

      - name: Download mcis
        run: |
          echo "=== 下载 Monte Carlo IP Searcher ==="
          wget -q https://github.com/Leo-Mu/montecarlo-ip-searcher/releases/download/v0.2.4/mcis-v0.2.4-linux-amd64.tar.gz
          
          if [ ! -f mcis-v0.2.4-linux-amd64.tar.gz ]; then
            echo "❌ 下载失败"
            exit 1
          fi
          
          tar -xzf mcis-v0.2.4-linux-amd64.tar.gz
          
          if [ -f mcis ]; then
            chmod +x mcis
            echo "✅ 可执行文件: mcis"
          else
            echo "❌ 未找到可执行文件 mcis"
            exit 1
          fi

      - name: Prepare CIDR File
        run: |
          echo "=== 准备 CIDR 文件 ==="
          wget -q https://www.cloudflare.com/ips-v4/ -O official_cidr.txt
          echo "官方 CIDR: $(wc -l < official_cidr.txt)"
          
          if [ -f ipv4cidr.txt ]; then
            echo "你的 CIDR: $(wc -l < ipv4cidr.txt)"
            cat official_cidr.txt ipv4cidr.txt | sort -u > all_cidr_raw.txt
          else
            cp official_cidr.txt all_cidr_raw.txt
          fi
          
          echo "合并后原始 CIDR 数量: $(wc -l < all_cidr_raw.txt)"

      - name: Validate and Clean CIDR
        run: |
          echo "=== 验证并清理 CIDR 格式 ==="
          
          cat > validate_cidr.py << 'EOF'
          import sys
          import ipaddress
          
          valid_count = 0
          invalid_count = 0
          
          with open('all_cidr_raw.txt', 'r') as f_in, open('all_cidr.txt', 'w') as f_out:
              for line in f_in:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  
                  try:
                      ipaddress.ip_network(line, strict=False)
                      f_out.write(line + '\n')
                      valid_count += 1
                  except ValueError:
                      print(f"⚠️ 无效 CIDR: {line}", file=sys.stderr)
                      invalid_count += 1
          
          print(f"✅ 有效 CIDR: {valid_count}")
          print(f"❌ 无效 CIDR: {invalid_count}")
          EOF
          
          python3 validate_cidr.py
          
          echo ""
          echo "清理后 CIDR 数量: $(wc -l < all_cidr.txt)"
          
          if [ ! -s all_cidr.txt ]; then
            echo "❌ 没有有效的 CIDR"
            exit 1
          fi

      - name: Run mcis - Smart Search
        run: |
          echo "=== mcis 智能搜索（预算: 2000 次探测） ==="
          
          COLO_LIST="HKG,TPE,NRT,KIX,ITM,FUK,ICN,SIN,BKK,HAN,SGN,MNL,CGK,KUL,RGN,PNH,BOM,DEL,MAA,BLR,HYD,CCU,SYD,MEL,BNE,PER,AKL"
          
          ./mcis \
            -cidr-file all_cidr.txt \
            -budget 2000 \
            -top 30 \
            -concurrency 100 \
            -timeout 3s \
            -host speed.cloudflare.com \
            -colo "$COLO_LIST" \
            -download-top 10 \
            -download-bytes 10485760 \
            -download-timeout 15s \
            -out jsonl \
            -out-file mcis_result.jsonl \
            -v
          
          echo ""
          echo "=== mcis 搜索完成 ==="
          
          if [ ! -f mcis_result.jsonl ]; then
            echo "❌ 未生成结果文件"
            exit 1
          fi

      # ... 后续步骤保持不变 ...
