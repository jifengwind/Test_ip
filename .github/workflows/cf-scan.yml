name: CF IP Liveness Filter (Optimized)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  SAMPLE_SIZE: 40000
  PROCESSES: 4
  THREADS_PER_PROCESS: 40
  TCP_TIMEOUT: 3
  MAX_LATENCY_FILTER: 9999
  PORT: 443
  OUTPUT_DIR: Proxy_ip  # 新增：输出目录变量

jobs:
  tcp-prescan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Output Directory
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          echo "✅ 创建输出目录: ${{ env.OUTPUT_DIR }}"

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y parallel curl python3
          echo "✅ 环境就绪"

      - name: Download CloudflareST
        run: |
          if [ ! -f CloudflareST ]; then
            wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz
            tar -xzf cfst_linux_amd64.tar.gz
            [ -f cfst ] && mv cfst CloudflareST && chmod +x CloudflareST
            rm cfst_linux_amd64.tar.gz
          fi
          echo "✅ CloudflareST 就绪"

      - name: Prepare High-Quality CIDR Pool
        run: |
          echo "=== 构建 CIDR 池 ==="
          mkdir -p sources
          
          curl -s --connect-timeout 10 https://www.cloudflare.com/ips-v4/ -o sources/official.txt || touch sources/official.txt
          curl -s --connect-timeout 10 https://raw.githubusercontent.com/vfarid/cf-ip-scanner/main/iplist.txt -o sources/vfarid.txt || touch sources/vfarid.txt
          curl -s --connect-timeout 10 https://raw.githubusercontent.com/ymyuuu/IPDB/main/cloudflare.txt -o sources/ipdb.txt || touch sources/ipdb.txt
          
          if [ -f ipv4cidr.txt ]; then cp ipv4cidr.txt sources/local.txt; else touch sources/local.txt; fi
          
          cat sources/*.txt | \
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(/[0-9]{1,2})?$' | \
            sort -u > all_cidrs.txt
          
          COUNT=$(wc -l < all_cidrs.txt)
          echo "✅ 种子 CIDR 段: ${COUNT} 个"

      - name: Weighted Random Sampling
        run: |
          echo "=== 随机采样 IP ==="
          python3 << 'EOF'
          import ipaddress
          import random
          import os
          import sys

          SAMPLE_SIZE = int(os.environ.get('SAMPLE_SIZE', 40000))
          cidrs = []
          
          with open('all_cidrs.txt') as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      net = ipaddress.ip_network(line, strict=False)
                      if 12 <= net.prefixlen <= 24:
                          cidrs.append(net)
                  except:
                      pass

          if not cidrs:
              print("❌ 无有效 CIDR")
              sys.exit(1)

          weighted_cidrs = []
          total_weight = 0
          for net in cidrs:
              weight = min(net.num_addresses, 65536)
              weighted_cidrs.append((net, weight))
              total_weight += weight

          sampled = []
          
          for net, weight in weighted_cidrs:
              prop = weight / total_weight
              count = max(1, int(SAMPLE_SIZE * prop))
              count = min(count, 1000)
              
              if net.num_addresses > 2:
                  sample_count = min(count, net.num_addresses - 2)
                  if sample_count > 0:
                      indices = random.sample(range(1, net.num_addresses - 1), sample_count)
                      for idx in indices:
                          sampled.append(str(net[idx]))
          
          random.shuffle(sampled)
          final_list = sampled[:SAMPLE_SIZE]
          
          with open('sampled_ips.txt', 'w') as f:
              for ip in final_list:
                  f.write(ip + '\n')
                  
          print(f"✅ 采样完成: {len(final_list)} 个 IP")
          EOF

      - name: Split IP List for Parallelism
        run: |
          split -n l/${{ env.PROCESSES }} -d -a 1 sampled_ips.txt ip_part_
          echo "✅ 分片完成"
          ls -l ip_part_*

      - name: Parallel TCP Liveness Scan
        run: |
          echo "=== 开始 TCP 存活扫描 ==="
          echo "并发: ${{ env.PROCESSES }} 进程 x ${{ env.THREADS_PER_PROCESS }} 线程 = $((${{ env.PROCESSES }} * ${{ env.THREADS_PER_PROCESS }}))"
          echo "超时: ${{ env.TCP_TIMEOUT }}s"
          
          ulimit -n 65535 2>/dev/null || echo "⚠️ ulimit 设置失败，使用默认值"
          
          parallel -j ${{ env.PROCESSES }} --timeout 2400 '
            part={}
            echo "[进程 {}] 开始扫描..."
            
            ./CloudflareST \
              -f $part \
              -n ${{ env.THREADS_PER_PROCESS }} \
              -t 2 \
              -tl ${{ env.MAX_LATENCY_FILTER }} \
              -tp ${{ env.PORT }} \
              -dd \
              -o result_{}.csv 2>&1 | tail -5
            
            if [ -f result_{}.csv ]; then
              count=$(($(wc -l < result_{}.csv) - 1))
              echo "[进程 {}] ✅ 存活 IP: $count"
            else
              echo "[进程 {}] ⚠️ 无结果"
            fi
          ' ::: ip_part_*

      - name: Merge and Deduplicate Results
        run: |
          echo "=== 合并结果 ==="
          python3 << 'EOF'
          import csv
          import glob
          import os

          OUTPUT_DIR = os.environ.get('OUTPUT_DIR', 'Proxy_ip')
          
          # 确保输出目录存在
          os.makedirs(OUTPUT_DIR, exist_ok=True)
          
          ip_set = set()
          result_files = sorted(glob.glob('result_ip_part_*.csv'))
          
          for f in result_files:
              try:
                  with open(f, 'r', encoding='utf-8', errors='ignore') as fp:
                      reader = csv.reader(fp)
                      header = next(reader, None)
                      
                      ip_idx = 0
                      if header:
                          for i, col in enumerate(header):
                              if 'ip' in col.lower():
                                  ip_idx = i
                                  break
                      
                      for row in reader:
                          if len(row) > ip_idx:
                              ip = row[ip_idx].strip()
                              if ip:
                                  ip_set.add(ip)
              except Exception as e:
                  print(f"Error reading {f}: {e}")
              finally:
                  if os.path.exists(f):
                      os.remove(f)

          live_ips = list(ip_set)
          print(f"✅ 去重后存活 IP 总数: {len(live_ips)}")
          
          # 输出到 Proxy_ip 目录
          live_ips_path = os.path.join(OUTPUT_DIR, 'live_cf_ips.txt')
          live_ips_port_path = os.path.join(OUTPUT_DIR, 'live_cf_ips_443.txt')
          
          with open(live_ips_path, 'w') as f:
              for ip in live_ips:
                  f.write(ip + '\n')
                  
          with open(live_ips_port_path, 'w') as f:
              for ip in live_ips:
                  f.write(f"{ip}:443\n")
                  
          print(f"✅ 结果已保存到 {OUTPUT_DIR}/ 目录")
          EOF

      - name: List Output Files
        run: |
          echo "=== 输出文件列表 ==="
          ls -lh ${{ env.OUTPUT_DIR }}/
          echo ""
          echo "=== 文件内容预览 ==="
          head -5 ${{ env.OUTPUT_DIR }}/live_cf_ips.txt 2>/dev/null || echo "文件为空"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-live-ips-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 14
          if-no-files-found: warn

      - name: Commit and Push Results (Optional)
        if: github.event_name != 'pull_request'
        run: |
          # 配置 Git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加输出文件
          git add ${{ env.OUTPUT_DIR }}/live_cf_ips.txt
          git add ${{ env.OUTPUT_DIR }}/live_cf_ips_443.txt
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "📝 没有新的变更，跳过提交"
          else
            # 提交并推送
            git commit -m "📊 Update CF live IPs - $(date +'%Y-%m-%d') [skip ci]"
            git push
            echo "✅ 结果已推送到仓库"
          fi
        continue-on-error: true

      - name: Show Summary
        run: |
          TOTAL=$(wc -l < ${{ env.OUTPUT_DIR }}/live_cf_ips.txt 2>/dev/null || echo 0)
          echo "=========================================="
          echo "📊 TCP 预筛选结果"
          echo "=========================================="
          echo "输出目录: ${{ env.OUTPUT_DIR }}"
          echo "存活 IP 数量: $TOTAL"
          echo ""
          if [ "$TOTAL" -gt 0 ]; then
            echo "示例 IP (前 10 个):"
            head -10 ${{ env.OUTPUT_DIR }}/live_cf_ips.txt
            echo ""
            echo "📁 文件位置:"
            echo "  - ${{ env.OUTPUT_DIR }}/live_cf_ips.txt"
            echo "  - ${{ env.OUTPUT_DIR }}/live_cf_ips_443.txt"
          else
            echo "⚠️ 未找到存活 IP"
          fi
          echo "=========================================="

      - name: Cleanup
        if: always()
        run: rm -f sampled_ips.txt ip_part_* CloudflareST *.csv all_cidrs.txt
