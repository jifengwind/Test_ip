name: CF IP Auto Select (TCPing + CacheFly)

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 18 * * *'  # 北京时间每天凌晨2点

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download CloudflareST
        run: |
          echo "=== 下载 CloudflareSpeedTest ==="
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST
          echo "下载完成"

      - name: Filter CIDR
        run: |
          echo "=== 预处理：过滤 Cloudflare 常见 IP 段 ==="
          grep -E "^(1\.|5\.|8\.|23\.|31\.|45\.|64\.|66\.|72\.|77\.|89\.|104\.|141\.|147\.|162\.|172\.|173\.|185\.|188\.|190\.|191\.|192\.|193\.|194\.|195\.|197\.|198\.|199\.|212\.)" ipv4cidr.txt > cf_cidr.txt 2>/dev/null || cp ipv4cidr.txt cf_cidr.txt
          echo "原始 CIDR 数量: $(wc -l < ipv4cidr.txt)"
          echo "过滤后 CIDR 数量: $(wc -l < cf_cidr.txt)"

      - name: Step 1 - TCPing 延迟粗筛
        run: |
          echo "=== 第1步：TCPing 延迟扫描 ==="
          # 改用 TCP 模式，不用 httping，稳定很多
          ./CloudflareST -f cf_cidr.txt -n 500 -t 8 -tl 300 -sl 5 -dn 0
          
          # 确保 result.csv 存在
          if [ ! -f result.csv ]; then
            echo "❌ 未找到任何可用 IP，请检查 CIDR 文件"
            exit 1
          fi
          
          awk -F ',' 'NR>1 {print $1}' result.csv > step1_500.txt
          echo "保留 $(wc -l < step1_500.txt) 个 IP（延迟 < 300ms）"

      - name: Step 2 - 剔除美西直连（延迟 < 2ms）
        run: |
          echo "=== 第2步：剔除美国超低延迟 IP ==="
          awk -F ',' 'NR>1 && $2 >= 2.0 {print $1}' result.csv > step2_filtered.txt
          
          if [ ! -s step2_filtered.txt ] || [ $(wc -l < step2_filtered.txt) -lt 5 ]; then
            echo "⚠️ 剔除后 IP 太少，改用 step1 结果"
            cp step1_500.txt step2_filtered.txt
          fi
          
          echo "剩余 $(wc -l < step2_filtered.txt) 个 IP"

      - name: Step 3 - 延迟排序取前30个
        run: |
          echo "=== 第3步：按延迟排序，取前30个 ==="
          ./CloudflareST -f step2_filtered.txt -n 30 -t 6 -tl 300 -sl 5 -dn 0
          
          awk -F ',' 'NR>1 {print $1}' result.csv > final_30.txt
          echo "保留 $(wc -l < final_30.txt) 个 IP"

      - name: Step 4 - CacheFly 下载测速
        run: |
          echo "=== 第4步：CacheFly 下载速度实测 ==="
          ./CloudflareST -f final_30.txt -n 10 -t 4 -tl 300 -sl 5 -dn 8 \
            -url http://cachefly.cachefly.net/100mb.test
          
          echo ""
          echo "=== 测速结果（按下载速度排序） ==="
          head -11 result.csv | column -t -s ','

      - name: Step 5 - 输出最优 IP
        run: |
          BEST_IP=$(awk -F ',' 'NR==2 {print $1}' result.csv)
          BEST_SPEED=$(awk -F ',' 'NR==2 {print $6}' result.csv)
          BEST_DELAY=$(awk -F ',' 'NR==2 {print $5}' result.csv)
          BEST_LOSS=$(awk -F ',' 'NR==2 {print $4}' result.csv)
          
          echo ""
          echo "=========================================="
          echo "🏆 最优 IP: $BEST_IP"
          echo "📊 下载速度: $BEST_SPEED MB/s"
          echo "📊 平均延迟: $BEST_DELAY ms"
          echo "📉 丢包率: $BEST_LOSS"
          echo "=========================================="
          
          echo $BEST_IP > best_ip.txt

      - name: Step 6 - 备选：下载测速全0则用延迟
        run: |
          ZERO_COUNT=$(awk -F ',' 'NR>1 && $6 == "0.00" {count++} END {print count+0}' result.csv)
          TOTAL_COUNT=$(awk -F ',' 'NR>1 {count++} END {print count+0}' result.csv)
          
          if [ "$ZERO_COUNT" -eq "$TOTAL_COUNT" ] && [ "$TOTAL_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠️ 所有 IP 下载速度均为 0，改用延迟排序结果"
            
            ./CloudflareST -f final_30.txt -n 1 -t 4 -tl 300 -sl 5 -dn 0
            
            BEST_IP=$(awk -F ',' 'NR==2 {print $1}' result.csv)
            BEST_DELAY=$(awk -F ',' 'NR==2 {print $5}' result.csv)
            
            echo "=========================================="
            echo "🏆 最优 IP (按延迟): $BEST_IP"
            echo "📊 平均延迟: $BEST_DELAY ms"
            echo "=========================================="
            
            echo $BEST_IP > best_ip.txt
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-results
          path: |
            best_ip.txt
            result.csv
            final_30.txt
