# =============================================================================
# CF IP Auto Select - 参数修正版 (禁用下载测速)
# =============================================================================
# 修正内容：
#   ✅ -n 参数：延迟测速线程数（非输出数量）
#   ✅ -tp 参数：指定测速端口（非超时时间）
#   ✅ -t 参数：延迟测速次数（每个IP测4次）
#   ✅ -tlr 参数：丢包率上限（替代错误的 -sl）
#   ✅ -dd 参数：禁用下载测速（只按延迟排序）
#   ✅ -p 参数：显示/输出结果数量
#   ✅ 自动诊断：失败时启用 -debug 模式
# =============================================================================

name: CF IP Auto Select (No Download Test)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'           # 每天北京时间 02:00 执行

env:
  # -------------------- 抽样配置 --------------------
  SAMPLE_SIZE: 100000               # 从 CIDR 中随机抽取的 IP 数量
  
  # -------------------- 延迟测速配置 --------------------
  THREADS: 200                      # 延迟测速线程数 (默认200)
  PING_COUNT: 4                     # 每个IP延迟测速次数 (默认4)
  MAX_LATENCY: 400                  # 平均延迟上限(ms)
  MAX_LOSS_RATE: 0.05               # 丢包率上限 (0.05 = 5%)
  
  # -------------------- 输出配置 --------------------
  OUTPUT_COUNT: 1500                # 最终输出的IP数量
  
  # -------------------- 端口配置 --------------------
  PORTS: "443 8443 2053"           # 测试端口列表
  DEFAULT_PORT: 443                 # 默认端口

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25              # 禁用下载测速后更快

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y parallel curl
          echo "✅ 依赖安装完成"

      - name: Create Output Directory
        run: mkdir -p Test_ip

      # ===============================
      # 下载 CloudflareST (含调试信息)
      # ===============================
      - name: Download CloudflareST
        run: |
          if [ ! -f CloudflareST ]; then
            echo "=== 下载 CloudflareST ==="
            wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz
            tar -xzf cfst_linux_amd64.tar.gz
            [ -f cfst ] && mv cfst CloudflareST && chmod +x CloudflareST
            rm cfst_linux_amd64.tar.gz
            echo "✅ 下载完成"
          fi
          
          echo ""
          echo "=========================================="
          echo "📋 CloudflareST 版本信息"
          echo "=========================================="
          ./CloudflareST -v 2>&1 || true
          
          echo ""
          echo "=========================================="
          echo "📋 本次测试将使用的参数 (禁用下载测速)"
          echo "=========================================="
          echo "  -f all_ips.txt          # IP列表文件"
          echo "  -n ${{ env.THREADS }}    # 延迟测速线程数"
          echo "  -t ${{ env.PING_COUNT }}  # 每个IP延迟测速次数"
          echo "  -tl ${{ env.MAX_LATENCY }} # 平均延迟上限(ms)"
          echo "  -tlr ${{ env.MAX_LOSS_RATE }} # 丢包率上限"
          echo "  -dd                     # 禁用下载测速"
          echo "  -p ${{ env.OUTPUT_COUNT }} # 输出结果数量"
          echo "  -tp [端口]               # 测试端口"
          echo "  -o result_[端口].csv     # 输出文件"
          echo ""

      # ===============================
      # 准备 CIDR 并极速抽样
      # ===============================
      - name: Prepare & Sample IPs
        run: |
          echo "=== 准备 CIDR 并抽样 ==="
          
          # 获取 CIDR
          if [ -f ipv4cidr.txt ]; then
            cp ipv4cidr.txt all_cidr.txt
            echo "✅ 使用本地 ipv4cidr.txt"
          else
            curl -s https://www.cloudflare.com/ips-v4/ -o all_cidr.txt
            echo "✅ 使用官方 CIDR"
          fi
          
          echo "CIDR 段数: $(wc -l < all_cidr.txt)"
          
          # 极速抽样
          python3 << 'EOF' > all_ips_raw.txt
          import ipaddress

          with open('all_cidr.txt') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      try:
                          net = ipaddress.ip_network(line, strict=False)
                          if net.num_addresses > 256:
                              step = max(1, (net.num_addresses - 2) // 5000)
                              for i in range(1, net.num_addresses - 1, step):
                                  print(net[i])
                      except:
                          pass
          EOF
          
          echo "候选池大小: $(wc -l < all_ips_raw.txt)"
          
          shuf -n ${{ env.SAMPLE_SIZE }} all_ips_raw.txt > all_ips.txt 2>/dev/null || \
          head -n ${{ env.SAMPLE_SIZE }} all_ips_raw.txt > all_ips.txt
          
          echo "待测试 IP: $(wc -l < all_ips.txt)"
          rm all_ips_raw.txt all_cidr.txt

      # ===============================
      # 多端口并行测试 (禁用下载测速版)
      # ===============================
      - name: Multi-Port Parallel Test
        run: |
          echo "=== 并行测试端口: ${{ env.PORTS }} ==="
          
          PORT_COUNT=$(echo "${{ env.PORTS }}" | wc -w)
          
          echo "端口数: $PORT_COUNT"
          echo "延迟测速线程(-n): ${{ env.THREADS }}"
          echo "每IP测速次数(-t): ${{ env.PING_COUNT }}"
          echo "延迟上限(-tl): ${{ env.MAX_LATENCY }}ms"
          echo "丢包率上限(-tlr): ${{ env.MAX_LOSS_RATE }}"
          echo "输出数量(-p): ${{ env.OUTPUT_COUNT }}"
          echo "下载测速: 已禁用(-dd)"
          echo ""
          
          # 并行执行
          echo "${{ env.PORTS }}" | tr ' ' '\n' | parallel -j $PORT_COUNT '
            port={}
            echo "=========================================="
            echo "[端口 $port] 开始测试..."
            echo "[端口 $port] 命令: ./CloudflareST -f all_ips.txt -n ${{ env.THREADS }} -t ${{ env.PING_COUNT }} -tl ${{ env.MAX_LATENCY }} -tlr ${{ env.MAX_LOSS_RATE }} -tp $port -dd -p ${{ env.OUTPUT_COUNT }} -o result_$port.csv"
            echo "=========================================="
            
            # 执行测试 (禁用下载测速)
            ./CloudflareST \
              -f all_ips.txt \
              -n ${{ env.THREADS }} \
              -t ${{ env.PING_COUNT }} \
              -tl ${{ env.MAX_LATENCY }} \
              -tlr ${{ env.MAX_LOSS_RATE }} \
              -tp $port \
              -dd \
              -p ${{ env.OUTPUT_COUNT }} \
              -o result_$port.csv 2>&1 | tail -40
            
            if [ -f result_$port.csv ] && [ $(wc -l < result_$port.csv) -gt 1 ]; then
              count=$(($(wc -l < result_$port.csv) - 1))
              echo ""
              echo "[端口 $port] ✅ 完成，获得 $count 个IP"
              echo "[端口 $port] 前5个结果预览:"
              head -6 result_$port.csv | column -t -s,
            else
              echo ""
              echo "[端口 $port] ❌ 无有效结果，启用调试模式重新测试..."
              
              # 调试模式
              ./CloudflareST \
                -f all_ips.txt \
                -n 50 \
                -t 2 \
                -tl 800 \
                -tp $port \
                -dd \
                -p 20 \
                -debug \
                -o debug_$port.csv 2>&1 | tail -50
              
              if [ -f debug_$port.csv ] && [ $(wc -l < debug_$port.csv) -gt 1 ]; then
                count=$(($(wc -l < debug_$port.csv) - 1))
                echo "[端口 $port] 调试模式获得 $count 个IP"
                mv debug_$port.csv result_$port.csv
              fi
            fi
            echo ""
          '
          
          # 合并结果
          echo ""
          echo "=== 合并测试结果 ==="
          > all_results.csv
          FIRST=true
          TOTAL=0
          
          for port in ${{ env.PORTS }}; do
            if [ -f result_$port.csv ] && [ $(wc -l < result_$port.csv) -gt 1 ]; then
              count=$(($(wc -l < result_$port.csv) - 1))
              echo "端口 $port: $count 条"
              TOTAL=$((TOTAL + count))
              
              if [ "$FIRST" = true ]; then
                head -1 result_$port.csv | sed 's/$/,测试端口/' > all_results.csv
                FIRST=false
              fi
              tail -n +2 result_$port.csv | awk -v p="$port" '{print $0 "," p}' >> all_results.csv
              rm result_$port.csv
            fi
          done
          
          echo ""
          echo "总测试结果: $TOTAL 条"
          
          if [ $TOTAL -le 0 ]; then
            echo "❌ 无有效结果"
            exit 1
          fi
          
          echo ""
          echo "=== 汇总数据预览 (前10行) ==="
          head -11 all_results.csv | column -t -s,

      # ===============================
      # 智能筛选 (精简版 - 仅按延迟排序)
      # ===============================
      - name: Smart Filter
        run: |
          echo "=== 智能筛选 (按延迟排序) ==="
          echo "配置: 最终输出=${{ env.OUTPUT_COUNT }} | 延迟上限=${{ env.MAX_LATENCY }}ms"
          echo ""
          
          python3 << 'EOF'
          import csv
          import os
          from collections import defaultdict
          
          FINAL_OUTPUT = int(os.environ.get('OUTPUT_COUNT', 1500))
          DEFAULT_PORT = os.environ.get('DEFAULT_PORT', '443')
          
          # ===============================
          # 运营商识别
          # ===============================
          def detect_isp(ip):
              parts = ip.split('.')
              if len(parts) != 4:
                  return '多线'
              first, second = parts[0], parts[1]
              
              # 移动
              if first == '104' and second in ('16','17','18','19','28','29'):
                  return '移动'
              if first == '162' and second == '159':
                  return '移动'
              if first == '172' and second in ('64','65','66','67','68'):
                  return '移动'
              
              # 联通
              if first == '104' and second in ('20','21','22','23','24','31'):
                  return '联通'
              if first == '162' and second == '158':
                  return '联通'
              
              # 电信
              if first == '104' and second in ('25','26','27','30'):
                  return '电信'
              if first == '162' and second in ('159','160'):
                  return '电信'
              if first == '172' and second in ('69','70'):
                  return '电信'
              
              return '多线'
          
          # ===============================
          # 读取数据
          # ===============================
          if not os.path.exists('all_results.csv'):
              print("❌ 无结果文件")
              exit(1)
          
          ip_data = defaultdict(list)
          
          with open('all_results.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              print(f"CSV列名: {reader.fieldnames}")
              
              for row in reader:
                  try:
                      ip = row.get('IP 地址', '').strip()
                      delay_str = row.get('平均延迟', '999').strip()
                      delay = float(delay_str) if delay_str else 999
                      loss_str = row.get('丢包率', '100').strip().rstrip('%')
                      loss = float(loss_str) if loss_str else 100
                      port = row.get('测试端口', '').strip()
                      
                      if delay > 0:
                          # 得分 = 延迟 + 丢包惩罚
                          score = delay * (1 + loss / 100)
                          ip_data[ip].append((port, delay, loss, score))
                  except:
                      continue
          
          print(f"有效 IP 数: {len(ip_data)}")
          
          # ===============================
          # 筛选最佳
          # ===============================
          results = []
          for ip, ports in ip_data.items():
              ports.sort(key=lambda x: x[3])  # 按得分排序
              best = ports[0]
              isp = detect_isp(ip)
              
              results.append({
                  'ip': ip,
                  'port': best[0],
                  'delay': best[1],
                  'loss': best[2],
                  'score': best[3],
                  'isp': isp,
                  'all_ports': [p[0] for p in ports]
              })
          
          # 按得分排序 (延迟越低越好)
          results.sort(key=lambda x: x['score'])
          top = results[:FINAL_OUTPUT]
          
          print(f"最终选出: {len(top)} 个IP")
          print("")
          
          # ===============================
          # 统计
          # ===============================
          stats = {'移动':0, '联通':0, '电信':0, '多线':0}
          port_stats = defaultdict(int)
          for r in top:
              stats[r['isp']] += 1
              port_stats[r['port']] += 1
          
          print("=== 运营商分布 ===")
          for k, v in stats.items():
              if v > 0:
                  avg_delay = sum(r['delay'] for r in top if r['isp'] == k) / v
                  print(f"  {k}: {v} ({v*100/len(top):.1f}%) 平均延迟: {avg_delay:.1f}ms")
          
          print("")
          print("=== 端口分布 ===")
          for port, count in sorted(port_stats.items(), key=lambda x: -x[1]):
              print(f"  端口 {port}: {count} ({count*100/len(top):.1f}%)")
          
          print("")
          print("=== 前15个优选IP ===")
          for i, r in enumerate(top[:15], 1):
              print(f"  {i:2}. {r['ip']}:{r['port']} [{r['isp']}] 延迟:{r['delay']:.1f}ms 丢包:{r['loss']:.1f}%")
          
          # ===============================
          # 保存文件
          # ===============================
          
          # 1. 主文件: IP:端口#运营商
          with open('Test_ip/result_IP.txt', 'w') as f:
              for r in top:
                  f.write(f"{r['ip']}:{r['port']}#{r['isp']}\n")
          
          # 2. 纯IP列表
          with open('Test_ip/best_ip.txt', 'w') as f:
              for r in top:
                  f.write(f"{r['ip']}\n")
          
          # 3. IP:默认端口#运营商
          with open('Test_ip/result_default_port.txt', 'w') as f:
              for r in top:
                  f.write(f"{r['ip']}:{DEFAULT_PORT}#{r['isp']}\n")
          
          # 4. 分运营商
          for isp in ['移动', '联通', '电信']:
              ips = [r for r in top if r['isp'] == isp]
              if ips:
                  with open(f'Test_ip/best_{isp}.txt', 'w') as f:
                      for r in ips[:100]:
                          f.write(f"{r['ip']}:{r['port']}\n")
          
          # 5. CSV详情
          with open('Test_ip/result.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['排名', 'IP', '端口', '运营商', '延迟(ms)', '丢包率(%)', '得分'])
              for i, r in enumerate(top, 1):
                  writer.writerow([i, r['ip'], r['port'], r['isp'], 
                                   f"{r['delay']:.1f}", f"{r['loss']:.1f}", f"{r['score']:.1f}"])
          
          print("")
          print("✅ 已保存到 Test_ip/")
          EOF

      # ===============================
      # 快速健康检查
      # ===============================
      - name: Quick Health Check
        run: |
          echo ""
          echo "=== 快速验证前5个IP ==="
          head -5 Test_ip/result_IP.txt | while IFS=':#' read ip port isp; do
            if [ -n "$ip" ] && [ -n "$port" ]; then
              echo -n "测试 $ip:$port ... "
              if curl -s --connect-timeout 3 --max-time 5 \
                 -o /dev/null -w "%{http_code}" \
                 --resolve speed.cloudflare.com:$port:$ip \
                 http://speed.cloudflare.com:$port/__down 2>/dev/null | grep -q "200"; then
                echo "✅ 可用"
              else
                echo "⚠️ 无响应"
              fi
            fi
          done

      # ===============================
      # 显示结果
      # ===============================
      - name: Show Results
        run: |
          echo ""
          echo "=========================================="
          echo "📁 Test_ip 目录内容"
          echo "=========================================="
          ls -lh Test_ip/
          echo ""
          echo "=========================================="
          echo "📊 优选结果 (前20个)"
          echo "=========================================="
          head -20 Test_ip/result_IP.txt
          echo ""
          echo "总IP数: $(wc -l < Test_ip/result_IP.txt)"

      # ===============================
      # 智能提交
      # ===============================
      - name: Smart Commit
        run: |
          if [ -f Test_ip/result_IP.txt ]; then
            NEW_HASH=$(md5sum Test_ip/result_IP.txt | cut -d' ' -f1)
            OLD_HASH=$(git show HEAD:Test_ip/result_IP.txt 2>/dev/null | md5sum | cut -d' ' -f1 || echo "")
            
            if [ "$NEW_HASH" != "$OLD_HASH" ]; then
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action"
              git add Test_ip/ -f
              
              TOTAL=$(wc -l < Test_ip/result_IP.txt)
              MOBILE=$(grep -c "#移动$" Test_ip/result_IP.txt 2>/dev/null || echo 0)
              UNICOM=$(grep -c "#联通$" Test_ip/result_IP.txt 2>/dev/null || echo 0)
              TELECOM=$(grep -c "#电信$" Test_ip/result_IP.txt 2>/dev/null || echo 0)
              
              git commit -m "🔄 Update CF IPs [$(date +'%m-%d %H:%M')] - 移动:$MOBILE 联通:$UNICOM 电信:$TELECOM"
              git push
              echo "✅ 已推送"
            else
              echo "⏭️ 无变化，跳过"
            fi
          fi

      # ===============================
      # 上传备份
      # ===============================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-ips-${{ github.run_number }}
          path: Test_ip/
          retention-days: 5

      # ===============================
      # 清理
      # ===============================
      - name: Cleanup
        if: always()
        run: rm -f all_ips.txt all_results.csv CloudflareST debug_*.csv

      # ===============================
      # 摘要
      # ===============================
      - name: Summary
        run: |
          {
            echo "## 📊 CF IP 优选摘要"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 执行时间 | $(date +'%Y-%m-%d %H:%M') |"
            echo "| 测试端口 | ${{ env.PORTS }} |"
            echo "| 延迟线程(-n) | ${{ env.THREADS }} |"
            echo "| 测速次数(-t) | ${{ env.PING_COUNT }} |"
            echo "| 延迟上限(-tl) | ${{ env.MAX_LATENCY }}ms |"
            echo "| 丢包上限(-tlr) | ${{ env.MAX_LOSS_RATE }} |"
            echo "| 下载测速 | 已禁用(-dd) |"
            echo "| 输出数量 | $(wc -l < Test_ip/result_IP.txt 2>/dev/null || echo 0) |"
            echo ""
            echo "### 🎯 前15个优选IP"
            echo '```'
            head -15 Test_ip/result_IP.txt 2>/dev/null || echo "无数据"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
