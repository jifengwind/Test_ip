name: CF IP Auto Select (Speed Only)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download CloudflareST
        run: |
          echo "=== 下载 CloudflareSpeedTest ==="
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST
          echo "下载完成"

      - name: Merge IP Sources
        run: |
          echo "=== 合并多个 IP 源 ==="
          
          wget -q https://www.cloudflare.com/ips-v4/ -O official_cidr.txt
          echo "官方 CIDR 数量: $(wc -l < official_cidr.txt)"
          
          if [ -f ipv4cidr.txt ]; then
            echo "你的 CIDR 数量: $(wc -l < ipv4cidr.txt)"
            cat official_cidr.txt ipv4cidr.txt | sort -u > merged_cidr.txt
          else
            cp official_cidr.txt merged_cidr.txt
          fi
          
          echo "合并后 CIDR 数量: $(wc -l < merged_cidr.txt)"
          
          grep -E "^(1\.|5\.|8\.|23\.|31\.|45\.|64\.|66\.|72\.|77\.|89\.|104\.|141\.|147\.|162\.|172\.|173\.|185\.|188\.|190\.|191\.|192\.|193\.|194\.|195\.|197\.|198\.|199\.|212\.)" merged_cidr.txt > cf_cidr.txt 2>/dev/null || cp merged_cidr.txt cf_cidr.txt
          
          echo "过滤后 CIDR 数量: $(wc -l < cf_cidr.txt)"

      - name: Step 1 - 延迟粗筛（只要连通性）
        run: |
          echo "=== 第1步：延迟粗筛（只淘汰超时的） ==="
          # 延迟上限放宽到 500ms，只淘汰完全不通的
          ./CloudflareST -f cf_cidr.txt -n 300 -t 8 -tl 500 -sl 5 -dn 0
          
          if [ ! -f result.csv ]; then
            echo "❌ 未找到任何可用 IP"
            exit 1
          fi
          
          awk -F ',' 'NR>1 {print $1}' result.csv > step1_300.txt
          echo "保留 $(wc -l < step1_300.txt) 个可用 IP"

      - name: Step 2 - 下载测速精选
        run: |
          echo "=== 第2步：下载速度实测（核心筛选） ==="
          echo "测速源: speedtest.tele2.net"
          
          # 直接用延迟粗筛的结果测下载速度，取前 10 个
          ./CloudflareST -f step1_300.txt -n 10 -t 4 -tl 500 -sl 5 -dn 10 \
            -url http://speedtest.tele2.net/100MB.zip
          
          echo ""
          echo "=== 测速结果（按下载速度排序） ==="
          head -11 result.csv | column -t -s ','

      - name: Step 3 - 输出最优 IP
        run: |
          BEST_IP=$(awk -F ',' 'NR==2 {print $1}' result.csv)
          BEST_SPEED=$(awk -F ',' 'NR==2 {print $6}' result.csv)
          BEST_DELAY=$(awk -F ',' 'NR==2 {print $5}' result.csv)
          BEST_LOSS=$(awk -F ',' 'NR==2 {print $4}' result.csv)
          
          echo ""
          echo "=========================================="
          echo "🏆 最优 IP: $BEST_IP"
          echo "📊 下载速度: $BEST_SPEED MB/s"
          echo "📊 平均延迟: $BEST_DELAY ms"
          echo "📉 丢包率: $BEST_LOSS"
          echo "=========================================="
          echo ""
          echo "💡 说明：此 IP 在境外测速中下载速度最快，国内访问大概率也不差"
          
          echo $BEST_IP > best_ip.txt

      - name: Step 4 - 备选：下载测速全0则用延迟
        run: |
          ZERO_COUNT=$(awk -F ',' 'NR>1 && $6 == "0.00" {count++} END {print count+0}' result.csv)
          TOTAL_COUNT=$(awk -F ',' 'NR>1 {count++} END {print count+0}' result.csv)
          
          if [ "$ZERO_COUNT" -eq "$TOTAL_COUNT" ] && [ "$TOTAL_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠️ 所有 IP 下载速度均为 0，改用延迟排序结果"
            
            ./CloudflareST -f step1_300.txt -n 1 -t 4 -tl 500 -sl 5 -dn 0
            
            BEST_IP=$(awk -F ',' 'NR==2 {print $1}' result.csv)
            BEST_DELAY=$(awk -F ',' 'NR==2 {print $5}' result.csv)
            
            echo "=========================================="
            echo "🏆 最优 IP (按延迟): $BEST_IP"
            echo "📊 平均延迟: $BEST_DELAY ms"
            echo "=========================================="
            
            echo $BEST_IP > best_ip.txt
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-results
          path: |
            best_ip.txt
            result.csv
            step1_300.txt
