# =============================================================================
# CF IP 极致扫描版 - 生产级优化
# =============================================================================
name: CF IP Extreme Scan Pro

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

env:
  # -------------------- 性能与平衡配置 --------------------
  SAMPLE_SIZE: 150000               # 网段质量提高后，15万采样已足够覆盖优质IP
  PROCESSES: 3                      # 3进程均衡双核CPU
  THREADS_PER_PROCESS: 100          # 总计300线程，这是Action PPS限速的临界安全点
  PING_COUNT: 1                     
  MAX_LOSS_RATE: 0.1                # 严格控制丢包率在10%以内
  
  # -------------------- 输出配置 --------------------
  OUTPUT_PER_PROCESS: 1000          # 总计输出 3000 个精选候选人
  PORTS: "443,8443,2053,2083,2087,2096"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y parallel curl
          echo "✅ 环境就绪"

      - name: Download CloudflareST
        run: |
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz
          tar -xzf cfst_linux_amd64.tar.gz
          mv cfst CloudflareST && chmod +x CloudflareST
          echo "✅ CloudflareST 准备就绪"

      # ===============================
      # 核心改进：引入社区高质量优选段
      # ===============================
      - name: Prepare High-Quality CIDR
        run: |
          echo "=== 正在构建高质量网段池 ==="
          # 获取官方段作为基底
          curl -s https://www.cloudflare.com/ips-v4/ -o official.txt
          # 获取社区长期维护的对华优化段 (源1: vfarid, 源2: IPDB)
          curl -s https://raw.githubusercontent.com/vfarid/cf-ip-scanner/main/iplist.txt -o source1.txt || touch source1.txt
          curl -s https://raw.githubusercontent.com/ymyuuu/IPDB/main/cloudflare.txt -o source2.txt || touch source2.txt
          
          # 合并清洗：提取 CIDR 格式并去重
          cat official.txt source1.txt source2.txt | grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}(/[0-9]{1,2})?$' | sort -u > all_cidr.txt
          echo "✅ 种子库构建完成，包含 $(wc -l < all_cidr.txt) 个优质网段"

      # ===============================
      # 核心改进：Python 权重随机抽样算法
      # ===============================
      - name: Python Random Sampling
        run: |
          python3 << 'EOF' > all_ips.txt
          import ipaddress
          import random
          import os

          sample_limit = int(os.environ.get('SAMPLE_SIZE', 150000))
          cidrs = []
          with open('all_cidr.txt') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      try: cidrs.append(ipaddress.ip_network(line, strict=False))
                      except: pass

          random.shuffle(cidrs) # 乱序处理，避免扫描过于集中
          total_ips_count = sum(net.num_addresses for net in cidrs)
          output_ips = []

          for net in cidrs:
              # 按比例分配该网段的采样数，实现全网段公平覆盖
              num_to_sample = max(1, int(sample_limit * net.num_addresses / total_ips_count))
              if net.num_addresses > 2:
                  count = min(num_to_sample, net.num_addresses - 2)
                  # 随机抽取 index 避免等间距采样的规律性
                  indices = random.sample(range(1, net.num_addresses - 1), count)
                  for idx in indices:
                      output_ips.append(str(net[idx]))

          random.shuffle(output_ips)
          for ip in output_ips[:sample_limit]:
              print(ip)
          EOF
          echo "✅ 随机采样完成：$(wc -l < all_ips.txt) 个独立 IP"

      # ===============================
      # 核心改进：多进程分片与真实可用性验证
      # ===============================
      - name: Parallel Verified Scan
        run: |
          split -n l/${{ env.PROCESSES }} -d -a 1 all_ips.txt ip_part_
          
          parallel -j ${{ env.PROCESSES }} '
            part={}
            ./CloudflareST \
              -f $part \
              -n ${{ env.THREADS_PER_PROCESS }} \
              -t 1 \
              -httping \
              -url https://cloudflare.com/cdn-cgi/trace \
              -tl 450 \
              -tlr ${{ env.MAX_LOSS_RATE }} \
              -tp ${{ env.PORTS }} \
              -dd \
              -p ${{ env.OUTPUT_PER_PROCESS }} \
              -o result_{}.csv > /dev/null 2>&1
            echo "[进程 {}] 扫描完成"
          ' ::: ip_part_*

      # ===============================
      # 结果合并：保留真实的 IP:端口 对应关系
      # ===============================
      - name: Intelligent Merge
        run: |
          mkdir -p Test_ip
          python3 << 'EOF'
          import os
          unique_records = set()
          final_list = []
          
          for f in os.listdir('.'):
              if f.startswith('result_ip_part_') and f.endswith('.csv'):
                  with open(f, 'r') as fp:
                      lines = fp.readlines()[1:] # 跳过表头
                      for line in lines:
                          parts = line.strip().split(',')
                          if len(parts) >= 2:
                              ip_port = f"{parts[0].strip()}:{parts[1].strip()}"
                              if ip_port not in unique_records:
                                  unique_records.add(ip_port)
                                  final_list.append(ip_port)
          
          with open('Test_ip/available_ips.txt', 'w') as f:
              f.write('\n'.join(final_list))
          print(f"✅ 最终筛选出 {len(final_list)} 个 100% 可用的 IP:端口 组合")
          EOF

      - name: Smart Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Test_ip/
          git commit -m "🔄 优选IP库更新: $(wc -l < Test_ip/available_ips.txt) 条 [$(date +'%Y-%m-%d')]" || exit 0
          git push
