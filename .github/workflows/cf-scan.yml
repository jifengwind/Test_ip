name: CF IP Auto Select (No API)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CloudflareST
        run: |
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST

      - name: Filter CIDR
        run: |
          grep -E "^(1\.|5\.|8\.|23\.|31\.|45\.|64\.|66\.|72\.|77\.|89\.|104\.|141\.|147\.|162\.|172\.|173\.|185\.|188\.|190\.|191\.|192\.|193\.|194\.|195\.|197\.|198\.|199\.|212\.)" ipv4cidr.txt > cf_cidr.txt 2>/dev/null || cp ipv4cidr.txt cf_cidr.txt
          echo "CIDR 数量: $(wc -l < cf_cidr.txt)"

      - name: Step 1 - 境外延迟扫描
        run: |
          echo "=== 第1步：延迟扫描（取前100个） ==="
          ./CloudflareST -f cf_cidr.txt -n 100 -t 8 -tl 400 -sl 5 -dn 0
          awk -F ',' 'NR>1 {print $1}' result.csv > step1_100.txt
          echo "保留 $(wc -l < step1_100.txt) 个 IP"

      - name: Step 2 - 剔除美西直连
        run: |
          echo "=== 第2步：剔除美国直连 IP ==="
          awk -F ',' 'NR>1 && $2 >= 2.0 {print $1}' result.csv > step2_filtered.txt
          if [ $(wc -l < step2_filtered.txt) -lt 5 ]; then
            cp step1_100.txt step2_filtered.txt
          fi
          echo "剩余 $(wc -l < step2_filtered.txt) 个 IP"

      - name: Step 3 - 下载速度实测（模拟国内）
        run: |
          echo "=== 第3步：下载速度测试 ==="
          # 用 CloudflareST 自带的下载测速，测 10 秒
          ./CloudflareST -f step2_filtered.txt -n 10 -t 4 -tl 400 -sl 5 -dn 10 -url https://speed.cloudflare.com/__down?bytes=104857600
          echo "=== 测速结果（按下载速度排序） ==="
          head -11 result.csv | column -t -s ','

      - name: Step 4 - 选出最优
        run: |
          BEST_IP=$(awk -F ',' 'NR==2 {print $1}' result.csv)
          BEST_SPEED=$(awk -F ',' 'NR==2 {print $6}' result.csv)
          echo "🏆 最优 IP: $BEST_IP"
          echo "📊 下载速度: $BEST_SPEED MB/s"
          echo $BEST_IP > best_ip.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: cf-results
          path: |
            best_ip.txt
            result.csv
