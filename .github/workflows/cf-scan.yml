name: CF IP Auto Select (Multi-Port Optimized)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

env:
  SAMPLE_SIZE: 300000
  OUTPUT_N: 8000
  FINAL_OUTPUT: 1000

  THREADS: 100
  MAX_LATENCY: 300
  MAX_LOSS: 2

  PORTS: "443 8443 2053 2083"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ===============================
      # 下载 CloudflareST
      # ===============================
      - name: Download CloudflareST
        run: |
          wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -xzf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST

      # ===============================
      # 获取 CIDR
      # ===============================
      - name: Get CIDR
        run: |
          curl -s https://www.cloudflare.com/ips-v4 > cidr.txt
          wc -l cidr.txt

      # ===============================
      # 高效抽样
      # ===============================
      - name: Generate IPs
        run: |
          python3 << 'EOF'
          import ipaddress, random

          SAMPLE_SIZE = int("${{ env.SAMPLE_SIZE }}")

          cidrs = [ipaddress.ip_network(x.strip()) for x in open("cidr.txt") if x.strip()]
          weights = [c.num_addresses for c in cidrs]

          result = set()

          while len(result) < SAMPLE_SIZE:
              net = random.choices(cidrs, weights=weights, k=1)[0]
              ip = net[random.randint(1, net.num_addresses-2)]
              result.add(str(ip))

          open("ips.txt","w").write("\n".join(result))
          print("生成IP:", len(result))
          EOF

      # ===============================
      # TCP预筛（多端口）
      # ===============================
      - name: TCP Pre-filter
        run: |
          sudo apt-get update && sudo apt-get install -y masscan

          sudo masscan -p443,8443,2053,2083 \
            -iL ips.txt \
            --rate 8000 \
            -oL tcp.txt

          awk '/open/ {print $4}' tcp.txt | sort -u > tcp_alive.txt

          echo "TCP存活IP:"
          wc -l tcp_alive.txt

      # ===============================
      # 多端口 httping 测试
      # ===============================
      - name: Multi-port Test
        run: |
          > all_results.csv

          for port in ${{ env.PORTS }}
          do
            echo "=== 测试端口 $port ==="

            ./CloudflareST \
              -f tcp_alive.txt \
              -n ${{ env.OUTPUT_N }} \
              -t ${{ env.THREADS }} \
              -tl ${{ env.MAX_LATENCY }} \
              -httping \
              -dd \
              -sl 8 \
              -p $port

            if [ -f result.csv ]; then
              tail -n +2 result.csv >> all_results.csv
            fi
          done

      # ===============================
      # 结果处理（多端口融合）
      # ===============================
      - name: Process Results
        run: |
          python3 << 'EOF'
          import csv

          FINAL = int("${{ env.FINAL_OUTPUT }}")
          MAX_LOSS = float("${{ env.MAX_LOSS }}")

          results = {}

          with open("all_results.csv") as f:
              reader = csv.DictReader(f)
              for r in reader:
                  try:
                      ip = r['IP 地址']
                      port = r['端口']
                      delay = float(r['平均延迟'])
                      loss = float(r['丢包率'].replace('%',''))
                  except:
                      continue

                  if loss > MAX_LOSS:
                      continue

                  score = delay * (1 + loss
