name: CF IP Auto Select (mcis)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Test_ip Directory
        run: mkdir -p Test_ip

      - name: Download mcis
        run: |
          echo "=== 下载 Monte Carlo IP Searcher ==="
          wget -q https://github.com/Leo-Mu/montecarlo-ip-searcher/releases/download/v0.2.4/mcis-v0.2.4-linux-amd64.tar.gz
          
          if [ ! -f mcis-v0.2.4-linux-amd64.tar.gz ]; then
            echo "❌ 下载失败"
            exit 1
          fi
          
          tar -xzf mcis-v0.2.4-linux-amd64.tar.gz
          
          if [ -f mcis ]; then
            chmod +x mcis
            echo "✅ 可执行文件: mcis"
          else
            echo "❌ 未找到可执行文件 mcis"
            exit 1
          fi

      - name: Prepare CIDR File
        run: |
          echo "=== 准备 CIDR 文件 ==="
          
          wget -q https://www.cloudflare.com/ips-v4/ -O official_cidr.txt
          echo "官方 CIDR: $(wc -l < official_cidr.txt)"
          
          if [ -f ipv4cidr.txt ]; then
            echo "你的 CIDR: $(wc -l < ipv4cidr.txt)"
            cat official_cidr.txt ipv4cidr.txt | sort -u > all_cidr_raw.txt
          else
            cp official_cidr.txt all_cidr_raw.txt
          fi
          
          echo "合并后原始 CIDR: $(wc -l < all_cidr_raw.txt)"

      - name: Validate and Clean CIDR
        run: |
          echo "=== 验证并清理 CIDR 格式 ==="
          
          cat > validate_cidr.py << 'EOF'
          import sys
          import ipaddress
          
          valid_count = 0
          invalid_count = 0
          
          with open('all_cidr_raw.txt', 'r') as f_in, open('all_cidr.txt', 'w') as f_out:
              for line in f_in:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  
                  try:
                      ipaddress.ip_network(line, strict=False)
                      f_out.write(line + '\n')
                      valid_count += 1
                  except ValueError:
                      print(f"⚠️ 无效 CIDR: {line}", file=sys.stderr)
                      invalid_count += 1
          
          print(f"✅ 有效 CIDR: {valid_count}")
          print(f"❌ 无效 CIDR: {invalid_count}")
          EOF
          
          python3 validate_cidr.py
          echo "清理后 CIDR 数量: $(wc -l < all_cidr.txt)"
          
          if [ ! -s all_cidr.txt ]; then
            echo "❌ 没有有效的 CIDR"
            exit 1
          fi

      - name: Run mcis - Smart Search
        run: |
          echo "=== mcis 智能搜索（预算: 3000 次探测） ==="
          
          # 关键改进：
          # 1. 使用默认 example.com + /cdn-cgi/trace（兼容性最好）
          # 2. timeout 改回 3s
          # 3. 开启 -v 查看进度
          # 4. 下载测速用 sequential 模式，直到 10 个成功
          ./mcis \
            -cidr-file all_cidr.txt \
            -budget 3000 \
            -top 30 \
            -concurrency 100 \
            -timeout 3s \
            -download-top 10 \
            -download-mode sequential \
            -download-bytes 10485760 \
            -download-timeout 15s \
            -download-url http://speedtest.tele2.net/100MB.zip \
            -out jsonl \
            -out-file mcis_result.jsonl \
            -v
          
          echo ""
          
          if [ ! -f mcis_result.jsonl ]; then
            echo "❌ 未生成结果文件"
            exit 1
          fi
          
          RESULT_COUNT=$(wc -l < mcis_result.jsonl)
          echo "=== mcis 搜索完成，返回 $RESULT_COUNT 个 IP ==="

      - name: Process Results - Generate Top 20
        run: |
          echo "=== 处理结果，生成前 20 个 IP ==="
          
          cat > process_result.py << 'EOF'
          import json
          import csv
          import os
          
          COLO_MAP = {
              "HKG": "香港", "TPE": "台北", "NRT": "东京", "KIX": "大阪",
              "ITM": "大阪伊丹", "FUK": "福冈", "ICN": "首尔", "SIN": "新加坡",
              "BKK": "曼谷", "HAN": "河内", "SGN": "胡志明市", "MNL": "马尼拉",
              "CGK": "雅加达", "KUL": "吉隆坡", "RGN": "仰光", "PNH": "金边",
              "BOM": "孟买", "DEL": "新德里", "MAA": "金奈", "BLR": "班加罗尔",
              "HYD": "海得拉巴", "CCU": "加尔各答", "SYD": "悉尼", "MEL": "墨尔本",
              "BNE": "布里斯班", "PER": "珀斯", "AKL": "奥克兰",
              "LAX": "洛杉矶", "SJC": "圣何塞", "SEA": "西雅图", "SFO": "旧金山",
              "DFW": "达拉斯", "ORD": "芝加哥", "IAD": "华盛顿", "JFK": "纽约",
              "LHR": "伦敦", "FRA": "法兰克福", "AMS": "阿姆斯特丹", "CDG": "巴黎",
              "MAD": "马德里", "MXP": "米兰", "DXB": "迪拜", "GRU": "圣保罗"
          }
          
          DEFAULT_PORT = "443"
          
          if not os.path.exists('mcis_result.jsonl'):
              print("❌ 未找到 mcis_result.jsonl")
              exit(1)
          
          all_results = []
          with open('mcis_result.jsonl', 'r') as f:
              for line in f:
                  if line.strip():
                      try:
                          all_results.append(json.loads(line))
                      except:
                          continue
          
          print(f"读取到 {len(all_results)} 个 IP")
          
          if len(all_results) == 0:
              print("❌ 没有搜索到符合条件的 IP")
              with open('Test_ip/best_20.txt', 'w') as f:
                  f.write("# No IPs found\n")
              with open('Test_ip/result_IP.txt', 'w') as f:
                  f.write("# No IPs found\n")
              exit(0)
          
          # 分类
          download_ok = []
          download_fail = []
          
          for r in all_results:
              if r.get('download_ok'):
                  download_ok.append(r)
              else:
                  download_fail.append(r)
          
          # 成功的按下载速度降序
          download_ok.sort(key=lambda x: x.get('download_mbps', 0), reverse=True)
          
          # 失败的按 score_ms 升序（综合评分，比单纯延迟更准）
          download_fail.sort(key=lambda x: x.get('score_ms', 999) if x.get('score_ms') else 999)
          
          # 合并
          results = download_ok + download_fail
          
          print(f"下载成功: {len(download_ok)} 个")
          print(f"下载失败: {len(download_fail)} 个")
          
          top20 = results[:20]
          
          print("")
          print("=== 最终前 20 个 IP ===")
          print(f"{'排名':<4} {'IP地址':<18} {'评分(ms)':<10} {'下载(MB/s)':<12} {'线路':<14} {'状态':<6}")
          print("-" * 78)
          
          for i, r in enumerate(top20, 1):
              ip = r.get('ip', '')
              score = r.get('score_ms', 0) or 0
              download_mbps = r.get('download_mbps', 0) or 0
              download_mbs = download_mbps / 8 if download_mbps > 0 else 0
              colo = r.get('colo', '') or ''
              line = COLO_MAP.get(colo, colo if colo else 'Cloudflare优选')
              status = "✅" if r.get('download_ok') else "⚠️"
              
              speed_str = f"{download_mbs:.1f}" if download_mbs > 0 else "-"
              print(f"{i:<4} {ip:<18} {score:<10.1f} {speed_str:<12} {line:<14} {status:<6}")
          
          # 保存 best_20.txt
          with open('Test_ip/best_20.txt', 'w') as f:
              for r in top20:
                  f.write(f"{r['ip']}\n")
          
          # 保存 result_IP.txt
          with open('Test_ip/result_IP.txt', 'w') as f:
              for r in top20:
                  ip = r['ip']
                  score = r.get('score_ms', 0) or 0
                  download_mbps = r.get('download_mbps', 0) or 0
                  colo = r.get('colo', '') or ''
                  line = COLO_MAP.get(colo, colo if colo else 'Cloudflare优选')
                  
                  if download_mbps > 0:
                      f.write(f"{ip}:{DEFAULT_PORT}#{line}-{score:.0f}ms-{download_mbps/8:.1f}MB\n")
                  else:
                      f.write(f"{ip}:{DEFAULT_PORT}#{line}-{score:.0f}ms\n")
          
          # 保存 result.csv
          with open('Test_ip/result.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['IP 地址', '端口', '评分(ms)', '下载(MB/s)', '下载(Mbps)', '线路', '地区码', '下载成功'])
              for r in top20:
                  ip = r['ip']
                  score = r.get('score_ms', 0) or 0
                  download_mbps = r.get('download_mbps', 0) or 0
                  download_mbs = download_mbps / 8 if download_mbps > 0 else 0
                  colo = r.get('colo', '') or ''
                  line = COLO_MAP.get(colo, colo if colo else 'Cloudflare优选')
                  ok = "是" if r.get('download_ok') else "否"
                  writer.writerow([ip, DEFAULT_PORT, f"{score:.1f}", f"{download_mbs:.2f}", f"{download_mbps:.2f}", line, colo, ok])
          
          print("")
          print(f"✅ 已保存前 20 个 IP 到 Test_ip 目录")
          EOF
          
          python3 process_result.py

      - name: Show Results
        run: |
          echo ""
          echo "=========================================="
          echo "📁 Test_ip 目录内容"
          echo "=========================================="
          ls -la Test_ip/ || echo "目录为空"
          echo ""
          
          if [ -f Test_ip/result_IP.txt ]; then
            echo "=========================================="
            echo "📄 result_IP.txt 内容预览"
            echo "=========================================="
            head -10 Test_ip/result_IP.txt
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Test_ip/
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "Update CF preferred IPs - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已推送到仓库"
          fi

      - name: Upload Artifacts (备用)
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-results
          path: Test_ip/
