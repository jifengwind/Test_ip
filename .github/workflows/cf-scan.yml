# =============================================================================
# CF IP Auto Select - HTTPing + TCP 混合版
# =============================================================================
# 特性：
#   ✅ HTTPing + TCP 双模式测试
#   ✅ 禁用下载测速 (-dd)
#   ✅ 移除运营商识别
#   ✅ 精简输出文件
#   ✅ 自动诊断
# =============================================================================

name: CF IP Auto Select (HTTPing + TCP)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'           # 每天北京时间 02:00 执行

env:
  # -------------------- 抽样配置 --------------------
  SAMPLE_SIZE: 100000               # 从 CIDR 中随机抽取的 IP 数量
  
  # -------------------- 延迟测速配置 --------------------
  THREADS: 200                      # 延迟测速线程数
  PING_COUNT: 4                     # 每个IP延迟测速次数
  MAX_LATENCY: 400                  # 平均延迟上限(ms)
  MAX_LOSS_RATE: 0.05               # 丢包率上限 (0.05 = 5%)
  
  # -------------------- 输出配置 --------------------
  OUTPUT_COUNT: 1500                # 最终输出的IP数量
  
  # -------------------- 端口配置 --------------------
  PORTS: "443 8443 2053"           # 测试端口列表
  DEFAULT_PORT: 443                 # 默认端口

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y parallel curl
          echo "✅ 依赖安装完成"

      - name: Create Output Directory
        run: mkdir -p Test_ip

      # ===============================
      # 下载 CloudflareST
      # ===============================
      - name: Download CloudflareST
        run: |
          if [ ! -f CloudflareST ]; then
            echo "=== 下载 CloudflareST ==="
            wget -q https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.3.4/cfst_linux_amd64.tar.gz
            tar -xzf cfst_linux_amd64.tar.gz
            [ -f cfst ] && mv cfst CloudflareST && chmod +x CloudflareST
            rm cfst_linux_amd64.tar.gz
            echo "✅ 下载完成"
          fi
          
          echo ""
          echo "=========================================="
          echo "📋 CloudflareST 版本信息"
          echo "=========================================="
          ./CloudflareST -v 2>&1 || true
          
          echo ""
          echo "=========================================="
          echo "📋 测试参数说明"
          echo "=========================================="
          echo "  模式1 (TCP):  -f all_ips.txt -n ${{ env.THREADS }} -t ${{ env.PING_COUNT }} -tl ${{ env.MAX_LATENCY }} -tlr ${{ env.MAX_LOSS_RATE }} -tp [端口] -dd -p ${{ env.OUTPUT_COUNT }}"
          echo "  模式2 (HTTP): -f all_ips.txt -n ${{ env.THREADS }} -t ${{ env.PING_COUNT }} -tl ${{ env.MAX_LATENCY }} -tlr ${{ env.MAX_LOSS_RATE }} -tp [端口] -httping -dd -p ${{ env.OUTPUT_COUNT }}"
          echo ""

      # ===============================
      # 准备 CIDR 并极速抽样
      # ===============================
      - name: Prepare & Sample IPs
        run: |
          echo "=== 准备 CIDR 并抽样 ==="
          
          if [ -f ipv4cidr.txt ]; then
            cp ipv4cidr.txt all_cidr.txt
            echo "✅ 使用本地 ipv4cidr.txt"
          else
            curl -s https://www.cloudflare.com/ips-v4/ -o all_cidr.txt
            echo "✅ 使用官方 CIDR"
          fi
          
          echo "CIDR 段数: $(wc -l < all_cidr.txt)"
          
          python3 << 'EOF' > all_ips_raw.txt
          import ipaddress

          with open('all_cidr.txt') as f:
              for line in f:
                  line = line.strip()
                  if line and not line.startswith('#'):
                      try:
                          net = ipaddress.ip_network(line, strict=False)
                          if net.num_addresses > 256:
                              step = max(1, (net.num_addresses - 2) // 5000)
                              for i in range(1, net.num_addresses - 1, step):
                                  print(net[i])
                      except:
                          pass
          EOF
          
          echo "候选池大小: $(wc -l < all_ips_raw.txt)"
          
          shuf -n ${{ env.SAMPLE_SIZE }} all_ips_raw.txt > all_ips.txt 2>/dev/null || \
          head -n ${{ env.SAMPLE_SIZE }} all_ips_raw.txt > all_ips.txt
          
          echo "待测试 IP: $(wc -l < all_ips.txt)"
          rm all_ips_raw.txt all_cidr.txt

      # ===============================
      # TCP 模式测试
      # ===============================
      - name: TCP Mode Test
        run: |
          echo "=== TCP 模式测试 ==="
          
          for port in ${{ env.PORTS }}; do
            echo ""
            echo "=========================================="
            echo "[TCP 模式] 测试端口: $port"
            echo "=========================================="
            
            ./CloudflareST \
              -f all_ips.txt \
              -n ${{ env.THREADS }} \
              -t ${{ env.PING_COUNT }} \
              -tl ${{ env.MAX_LATENCY }} \
              -tlr ${{ env.MAX_LOSS_RATE }} \
              -tp $port \
              -dd \
              -p ${{ env.OUTPUT_COUNT }} \
              -o tcp_result_$port.csv 2>&1 | tail -30
            
            if [ -f tcp_result_$port.csv ] && [ $(wc -l < tcp_result_$port.csv) -gt 1 ]; then
              count=$(($(wc -l < tcp_result_$port.csv) - 1))
              echo "[TCP:$port] ✅ 获得 $count 个IP"
            else
              echo "[TCP:$port] ⚠️ 无结果"
            fi
          done

      # ===============================
      # HTTPing 模式测试
      # ===============================
      - name: HTTPing Mode Test
        run: |
          echo ""
          echo "=== HTTPing 模式测试 ==="
          
          for port in ${{ env.PORTS }}; do
            echo ""
            echo "=========================================="
            echo "[HTTPing 模式] 测试端口: $port"
            echo "=========================================="
            
            ./CloudflareST \
              -f all_ips.txt \
              -n ${{ env.THREADS }} \
              -t ${{ env.PING_COUNT }} \
              -tl ${{ env.MAX_LATENCY }} \
              -tlr ${{ env.MAX_LOSS_RATE }} \
              -tp $port \
              -httping \
              -dd \
              -p ${{ env.OUTPUT_COUNT }} \
              -o http_result_$port.csv 2>&1 | tail -30
            
            if [ -f http_result_$port.csv ] && [ $(wc -l < http_result_$port.csv) -gt 1 ]; then
              count=$(($(wc -l < http_result_$port.csv) - 1))
              echo "[HTTP:$port] ✅ 获得 $count 个IP"
            else
              echo "[HTTP:$port] ⚠️ 无结果"
            fi
          done

      # ===============================
      # 合并所有结果
      # ===============================
      - name: Merge All Results
        run: |
          echo ""
          echo "=== 合并 TCP + HTTPing 结果 ==="
          
          > all_results.csv
          FIRST=true
          TOTAL=0
          
          # 合并 TCP 结果
          for port in ${{ env.PORTS }}; do
            if [ -f tcp_result_$port.csv ] && [ $(wc -l < tcp_result_$port.csv) -gt 1 ]; then
              count=$(($(wc -l < tcp_result_$port.csv) - 1))
              echo "TCP:$port -> $count 条"
              TOTAL=$((TOTAL + count))
              
              if [ "$FIRST" = true ]; then
                head -1 tcp_result_$port.csv | sed 's/$/,测试模式,测试端口/' > all_results.csv
                FIRST=false
              fi
              tail -n +2 tcp_result_$port.csv | awk -v m="TCP" -v p="$port" '{print $0 "," m "," p}' >> all_results.csv
              rm tcp_result_$port.csv
            fi
          done
          
          # 合并 HTTPing 结果
          for port in ${{ env.PORTS }}; do
            if [ -f http_result_$port.csv ] && [ $(wc -l < http_result_$port.csv) -gt 1 ]; then
              count=$(($(wc -l < http_result_$port.csv) - 1))
              echo "HTTP:$port -> $count 条"
              TOTAL=$((TOTAL + count))
              
              if [ "$FIRST" = true ]; then
                head -1 http_result_$port.csv | sed 's/$/,测试模式,测试端口/' > all_results.csv
                FIRST=false
              fi
              tail -n +2 http_result_$port.csv | awk -v m="HTTP" -v p="$port" '{print $0 "," m "," p}' >> all_results.csv
              rm http_result_$port.csv
            fi
          done
          
          echo ""
          echo "总结果数: $TOTAL 条"
          
          if [ $TOTAL -le 0 ]; then
            echo "❌ 无有效结果，尝试调试模式..."
            
            # 调试模式
            echo ""
            echo "=== 调试模式测试 (端口443) ==="
            ./CloudflareST \
              -f all_ips.txt \
              -n 50 \
              -t 2 \
              -tl 800 \
              -tp 443 \
              -httping \
              -dd \
              -p 50 \
              -debug \
              -o debug_result.csv 2>&1 | tail -50
            
            if [ -f debug_result.csv ] && [ $(wc -l < debug_result.csv) -gt 1 ]; then
              count=$(($(wc -l < debug_result.csv) - 1))
              echo "调试模式获得 $count 个IP"
              head -1 debug_result.csv | sed 's/$/,测试模式,测试端口/' > all_results.csv
              tail -n +2 debug_result.csv | awk -v m="DEBUG" -v p="443" '{print $0 "," m "," p}' >> all_results.csv
              TOTAL=$count
            else
              echo "❌ 调试模式也无结果"
              exit 1
            fi
          fi
          
          echo ""
          echo "=== 汇总数据预览 (前10行) ==="
          head -11 all_results.csv | column -t -s,

      # ===============================
      # 智能筛选 (无运营商)
      # ===============================
      - name: Smart Filter
        run: |
          echo ""
          echo "=== 智能筛选 (按延迟排序) ==="
          
          python3 << 'EOF'
          import csv
          import os
          from collections import defaultdict
          
          FINAL_OUTPUT = int(os.environ.get('OUTPUT_COUNT', 1500))
          DEFAULT_PORT = os.environ.get('DEFAULT_PORT', '443')
          
          if not os.path.exists('all_results.csv'):
              print("❌ 无结果文件")
              exit(1)
          
          # 按 IP 聚合，找出每个 IP 的最佳结果
          ip_data = defaultdict(list)
          
          with open('all_results.csv', 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              print(f"CSV列名: {reader.fieldnames}")
              
              for row in reader:
                  try:
                      ip = row.get('IP 地址', '').strip()
                      delay_str = row.get('平均延迟', '999').strip()
                      delay = float(delay_str) if delay_str else 999
                      loss_str = row.get('丢包率', '100').strip().rstrip('%')
                      loss = float(loss_str) if loss_str else 100
                      port = row.get('测试端口', '').strip()
                      mode = row.get('测试模式', '').strip()
                      
                      if delay > 0:
                          # 得分 = 延迟 + 丢包惩罚
                          # HTTPing 模式加权 (通常更准确)
                          mode_weight = 0.95 if mode == 'HTTP' else 1.0
                          score = delay * (1 + loss / 100) * mode_weight
                          ip_data[ip].append((port, mode, delay, loss, score))
                  except:
                      continue
          
          print(f"有效 IP 数: {len(ip_data)}")
          
          # 筛选最佳
          results = []
          for ip, records in ip_data.items():
              records.sort(key=lambda x: x[4])  # 按得分排序
              best = records[0]
              
              results.append({
                  'ip': ip,
                  'port': best[0],
                  'mode': best[1],
                  'delay': best[2],
                  'loss': best[3],
                  'score': best[4]
              })
          
          # 按得分排序
          results.sort(key=lambda x: x['score'])
          top = results[:FINAL_OUTPUT]
          
          print(f"最终选出: {len(top)} 个IP")
          print("")
          
          # 统计
          port_stats = defaultdict(int)
          mode_stats = defaultdict(int)
          for r in top:
              port_stats[r['port']] += 1
              mode_stats[r['mode']] += 1
          
          print("=== 测试模式分布 ===")
          for mode, count in sorted(mode_stats.items(), key=lambda x: -x[1]):
              print(f"  {mode}: {count} ({count*100/len(top):.1f}%)")
          
          print("")
          print("=== 端口分布 ===")
          for port, count in sorted(port_stats.items(), key=lambda x: -x[1]):
              print(f"  {port}: {count} ({count*100/len(top):.1f}%)")
          
          print("")
          print("=== 延迟统计 ===")
          delays = [r['delay'] for r in top]
          print(f"  最低: {min(delays):.1f}ms")
          print(f"  最高: {max(delays):.1f}ms")
          print(f"  平均: {sum(delays)/len(delays):.1f}ms")
          
          print("")
          print("=== 前20个优选IP ===")
          for i, r in enumerate(top[:20], 1):
              print(f"  {i:2}. {r['ip']}:{r['port']} [{r['mode']}] 延迟:{r['delay']:.1f}ms 丢包:{r['loss']:.1f}%")
          
          # ===============================
          # 保存文件 (精简版)
          # ===============================
          
          # 1. 主文件: IP:端口
          with open('Test_ip/result_IP.txt', 'w') as f:
              for r in top:
                  f.write(f"{r['ip']}:{r['port']}\n")
          
          # 2. 纯IP列表
          with open('Test_ip/best_ip.txt', 'w') as f:
              for r in top:
                  f.write(f"{r['ip']}\n")
          
          # 3. IP:默认端口
          with open('Test_ip/result_default_port.txt', 'w') as f:
              for r in top:
                  f.write(f"{r['ip']}:{DEFAULT_PORT}\n")
          
          # 4. 按测试模式分类
          for mode in ['TCP', 'HTTP', 'DEBUG']:
              mode_ips = [r for r in top if r['mode'] == mode]
              if mode_ips:
                  with open(f'Test_ip/best_{mode}.txt', 'w') as f:
                      for r in mode_ips[:200]:
                          f.write(f"{r['ip']}:{r['port']}\n")
          
          # 5. CSV详情
          with open('Test_ip/result.csv', 'w', newline='', encoding='utf-8') as f:
              writer = csv.writer(f)
              writer.writerow(['排名', 'IP', '端口', '模式', '延迟(ms)', '丢包率(%)', '得分'])
              for i, r in enumerate(top, 1):
                  writer.writerow([i, r['ip'], r['port'], r['mode'], 
                                   f"{r['delay']:.1f}", f"{r['loss']:.1f}", f"{r['score']:.1f}"])
          
          print("")
          print("✅ 已保存到 Test_ip/")
          EOF

      # ===============================
      # 快速健康检查
      # ===============================
      - name: Quick Health Check
        run: |
          echo ""
          echo "=== 快速验证前5个IP ==="
          head -5 Test_ip/result_IP.txt | while IFS=':' read ip port; do
            if [ -n "$ip" ] && [ -n "$port" ]; then
              echo -n "测试 $ip:$port ... "
              if curl -s --connect-timeout 3 --max-time 5 \
                 -o /dev/null -w "%{http_code}" \
                 --resolve cloudflare.com:$port:$ip \
                 http://cloudflare.com:$port/cdn-cgi/trace 2>/dev/null | grep -q "200"; then
                echo "✅ 可用"
              else
                echo "⚠️ 无响应"
              fi
            fi
          done

      # ===============================
      # 显示结果
      # ===============================
      - name: Show Results
        run: |
          echo ""
          echo "=========================================="
          echo "📁 Test_ip 目录内容"
          echo "=========================================="
          ls -lh Test_ip/
          echo ""
          echo "=========================================="
          echo "📊 优选结果 (前20个)"
          echo "=========================================="
          head -20 Test_ip/result_IP.txt
          echo ""
          echo "总IP数: $(wc -l < Test_ip/result_IP.txt)"

      # ===============================
      # 智能提交
      # ===============================
      - name: Smart Commit
        run: |
          if [ -f Test_ip/result_IP.txt ]; then
            NEW_HASH=$(md5sum Test_ip/result_IP.txt | cut -d' ' -f1)
            OLD_HASH=$(git show HEAD:Test_ip/result_IP.txt 2>/dev/null | md5sum | cut -d' ' -f1 || echo "")
            
            if [ "$NEW_HASH" != "$OLD_HASH" ]; then
              git config --local user.email "action@github.com"
              git config --local user.name "GitHub Action"
              git add Test_ip/ -f
              
              TOTAL=$(wc -l < Test_ip/result_IP.txt)
              TCP_COUNT=$(grep -c ",TCP," Test_ip/result.csv 2>/dev/null || echo 0)
              HTTP_COUNT=$(grep -c ",HTTP," Test_ip/result.csv 2>/dev/null || echo 0)
              
              git commit -m "🔄 Update CF IPs [$(date +'%m-%d %H:%M')] - Total:$TOTAL (TCP:$TCP_COUNT HTTP:$HTTP_COUNT)"
              git push
              echo "✅ 已推送"
            else
              echo "⏭️ 无变化，跳过"
            fi
          fi

      # ===============================
      # 上传备份
      # ===============================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-ips-${{ github.run_number }}
          path: Test_ip/
          retention-days: 5

      # ===============================
      # 清理
      # ===============================
      - name: Cleanup
        if: always()
        run: rm -f all_ips.txt all_results.csv CloudflareST *_result_*.csv debug_*.csv

      # ===============================
      # 摘要
      # ===============================
      - name: Summary
        run: |
          {
            echo "## 📊 CF IP 优选摘要 (TCP + HTTPing)"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 执行时间 | $(date +'%Y-%m-%d %H:%M') |"
            echo "| 测试端口 | ${{ env.PORTS }} |"
            echo "| 测试模式 | TCP + HTTPing |"
            echo "| 延迟线程(-n) | ${{ env.THREADS }} |"
            echo "| 测速次数(-t) | ${{ env.PING_COUNT }} |"
            echo "| 延迟上限(-tl) | ${{ env.MAX_LATENCY }}ms |"
            echo "| 丢包上限(-tlr) | ${{ env.MAX_LOSS_RATE }} |"
            echo "| 下载测速 | 已禁用(-dd) |"
            echo "| 输出数量 | $(wc -l < Test_ip/result_IP.txt 2>/dev/null || echo 0) |"
            echo ""
            echo "### 🎯 前20个优选IP"
            echo '```'
            head -20 Test_ip/result_IP.txt 2>/dev/null || echo "无数据"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
