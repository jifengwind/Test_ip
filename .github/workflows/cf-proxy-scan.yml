# =============================================================================
# Cloudflare 代理优选 IP - 每日自动扫描（支持手动参数）
# =============================================================================

name: CF Proxy IP Scanner

on:
  workflow_dispatch:                # 手动触发，支持输入参数
    inputs:
      threads:
        description: '并发线程数'
        required: false
        type: choice
        default: '8'
        options:
          - '4'
          - '8'
          - '16'
          - '32'
      min_speed:
        description: '最低下载速度 (KB/s)'
        required: false
        type: choice
        default: '100'
        options:
          - '50'
          - '100'
          - '200'
          - '500'
      max_ips_per_cidr:
        description: '每个 CIDR 最多取多少 IP'
        required: false
        type: choice
        default: '200'
        options:
          - '100'
          - '200'
          - '500'
          - '1000'
      cidr_mode:
        description: 'IP 段来源模式'
        required: false
        type: choice
        default: 'full'
        options:
          - 'basic'      # 仅内置基础段
          - 'full'       # 内置段 + 远程获取
          - 'asia'       # 仅亚洲区域段
  schedule:
    - cron: '0 18 * * *'           # 每天 UTC 18:00 = 北京时间 02:00

env:
  # 默认值（用于定时触发）
  THREADS_DEFAULT: 8
  MIN_SPEED_DEFAULT: 100
  MAX_IPS_PER_CIDR_DEFAULT: 200
  CIDR_MODE_DEFAULT: full

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set Parameters
        id: params
        run: |
          # 如果是手动触发，使用输入值；否则使用默认值
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            THREADS="${{ github.event.inputs.threads }}"
            MIN_SPEED="${{ github.event.inputs.min_speed }}"
            MAX_IPS="${{ github.event.inputs.max_ips_per_cidr }}"
            CIDR_MODE="${{ github.event.inputs.cidr_mode }}"
          else
            THREADS="${{ env.THREADS_DEFAULT }}"
            MIN_SPEED="${{ env.MIN_SPEED_DEFAULT }}"
            MAX_IPS="${{ env.MAX_IPS_PER_CIDR_DEFAULT }}"
            CIDR_MODE="${{ env.CIDR_MODE_DEFAULT }}"
          fi
          
          echo "THREADS=${THREADS}" >> $GITHUB_OUTPUT
          echo "MIN_SPEED=${MIN_SPEED}" >> $GITHUB_OUTPUT
          echo "MAX_IPS=${MAX_IPS}" >> $GITHUB_OUTPUT
          echo "CIDR_MODE=${CIDR_MODE}" >> $GITHUB_OUTPUT
          
          echo "=== 运行参数 ==="
          echo "触发方式: ${{ github.event_name }}"
          echo "线程数: ${THREADS}"
          echo "最低速度: ${MIN_SPEED} KB/s"
          echo "每 CIDR 取 IP 数: ${MAX_IPS}"
          echo "IP 段模式: ${CIDR_MODE}"
          echo "================="

      - name: Install Dependencies
        run: |
          echo "=== 安装依赖 ==="
          pip install --upgrade pip
          pip install cfscanner requests
          echo "✅ 依赖安装完成"

      - name: Run CF Scanner
        run: |
          echo "=== 开始扫描 Cloudflare 代理优选 IP ==="
          
          python3 << EOF
          import subprocess
          import sys
          import os
          import ipaddress
          import requests
          from datetime import datetime
          
          # 从环境变量获取参数
          THREADS = int("${{ steps.params.outputs.THREADS }}")
          MIN_SPEED = int("${{ steps.params.outputs.MIN_SPEED }}")
          MAX_IPS_PER_CIDR = int("${{ steps.params.outputs.MAX_IPS }}")
          CIDR_MODE = "${{ steps.params.outputs.CIDR_MODE }}"
          OUTPUT_FILE = "cf_best_ips.txt"
          
          # ==================== IP 段配置 ====================
          
          # 基础段（所有模式共用）
          BASIC_CIDRS = [
              # 移动/联通优选段
              "104.23.240.0/22",
              "172.64.32.0/22",
              "141.101.115.0/24",
              # 电信相对友好段
              "162.159.208.0/22",
              "162.159.212.0/22",
          ]
          
          # 扩展段（full 模式追加）
          EXTENDED_CIDRS = [
              "104.16.160.0/20",
              "104.18.0.0/20",
              "104.19.0.0/20",
              "104.24.0.0/14",
              "104.28.0.0/14",
          ]
          
          # 亚洲区域经验段
          ASIA_CIDRS = [
              "104.16.0.0/13",
              "104.24.0.0/14",
              "172.64.0.0/13",
              "141.101.64.0/18",
          ]
          
          REMOTE_LIST_URL = "https://raw.githubusercontent.com/ip-scanner/cloudflare/main/cloudflare-ip.txt"
          
          # ==================== 函数定义 ====================
          def fetch_remote_cidrs():
              print("[*] 尝试从远程获取额外 IP 段...")
              try:
                  resp = requests.get(REMOTE_LIST_URL, timeout=10)
                  if resp.status_code == 200:
                      lines = resp.text.strip().split('\n')
                      cidrs = [line.strip() for line in lines if line.strip() and not line.startswith('#')]
                      print(f"[+] 远程获取到 {len(cidrs)} 个 IP 段")
                      return cidrs
              except Exception as e:
                  print(f"[-] 远程获取失败: {e}")
              return []
          
          def expand_cidrs(cidr_list, max_ips_per_cidr=200):
              print(f"[*] 展开 {len(cidr_list)} 个 CIDR 段...")
              all_ips = []
              for cidr_str in cidr_list:
                  try:
                      net = ipaddress.ip_network(cidr_str, strict=False)
                      ips = [str(ip) for ip in net.hosts()]
                      if len(ips) > max_ips_per_cidr:
                          ips = ips[:max_ips_per_cidr]
                      all_ips.extend(ips)
                  except Exception as e:
                      print(f"[-] 解析 {cidr_str} 失败: {e}")
              print(f"[+] 共展开 {len(all_ips)} 个 IP")
              return all_ips
          
          def run_cfscanner(ip_list):
              temp_file = "temp_ips.txt"
              with open(temp_file, 'w') as f:
                  f.write('\n'.join(ip_list))
              
              print(f"\n[*] 开始扫描 (线程={THREADS}, 最低速度={MIN_SPEED}KB/s)...")
              print("-" * 50)
              
              cmd = [
                  "cfscanner",
                  "-f", temp_file,
                  "-t", str(THREADS),
                  "-DS", str(MIN_SPEED),
                  "-o", OUTPUT_FILE
              ]
              
              try:
                  process = subprocess.Popen(
                      cmd,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      text=True,
                      bufsize=1
                  )
                  for line in process.stdout:
                      print(line, end='')
                  process.wait()
                  return process.returncode == 0
              except FileNotFoundError:
                  print("\n[-] 错误: 未找到 cfscanner")
                  return False
              finally:
                  if os.path.exists(temp_file):
                      os.remove(temp_file)
          
          # ==================== 主流程 ====================
          print("=" * 60)
          print("🚀 Cloudflare 代理优选 IP 扫描器")
          print(f"⏰ 开始时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
          print(f"⚙️  模式: {CIDR_MODE}")
          print("=" * 60)
          
          # 根据模式选择 CIDR
          if CIDR_MODE == "basic":
              all_cidrs = BASIC_CIDRS.copy()
          elif CIDR_MODE == "asia":
              all_cidrs = ASIA_CIDRS.copy()
          else:  # full
              all_cidrs = BASIC_CIDRS.copy() + EXTENDED_CIDRS.copy()
              remote_cidrs = fetch_remote_cidrs()
              if remote_cidrs:
                  all_cidrs.extend(remote_cidrs[:8])
          
          all_cidrs = list(set(all_cidrs))
          print(f"\n[+] 总计 {len(all_cidrs)} 个 CIDR 段待扫描")
          
          # 显示前 5 个段
          print("前 5 个 CIDR 段:")
          for cidr in all_cidrs[:5]:
              print(f"  - {cidr}")
          
          ip_list = expand_cidrs(all_cidrs, MAX_IPS_PER_CIDR)
          
          if not ip_list:
              print("[-] 没有 IP 可扫描，退出")
              sys.exit(1)
          
          success = run_cfscanner(ip_list)
          
          if success:
              print("\n✅ 扫描完成")
              if os.path.exists(OUTPUT_FILE):
                  with open(OUTPUT_FILE, 'r') as f:
                      lines = f.readlines()
                  print(f"共找到 {len(lines)} 个可用 IP")
                  if lines:
                      print("\n🏆 前 10 个最优 IP:")
                      for i, line in enumerate(lines[:10], 1):
                          print(f"  {i:2}. {line.strip()}")
          else:
              print("\n❌ 扫描失败")
              sys.exit(1)
          EOF

      - name: Show Results
        run: |
          echo ""
          echo "=========================================="
          echo "📁 扫描结果"
          echo "=========================================="
          
          if [ -f cf_best_ips.txt ]; then
            COUNT=$(wc -l < cf_best_ips.txt)
            echo "✅ 共找到 ${COUNT} 个可用 IP"
            echo ""
            echo "结果内容:"
            cat cf_best_ips.txt
          else
            echo "⚠️ 未生成结果文件"
          fi

      - name: Commit and Push Results
        run: |
          mkdir -p results
          
          if [ -f cf_best_ips.txt ]; then
            DATE_TAG=$(date +'%Y%m%d')
            MODE="${{ steps.params.outputs.CIDR_MODE }}"
            
            # 保存带日期和模式的文件
            cp cf_best_ips.txt results/cf_ips_${DATE_TAG}_${MODE}.txt
            cp cf_best_ips.txt results/cf_ips_latest.txt
            
            echo "✅ 结果已保存:"
            echo "   - results/cf_ips_${DATE_TAG}_${MODE}.txt"
            echo "   - results/cf_ips_latest.txt"
          fi
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add results/
          
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "Update CF proxy IPs [$MODE] - $(date +'%Y-%m-%d')"
            git push
            echo "✅ 已推送到仓库"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cf-proxy-ips-${{ steps.params.outputs.CIDR_MODE }}
          path: cf_best_ips.txt
