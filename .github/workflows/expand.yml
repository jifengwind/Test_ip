name: Expand CIDR to IP List

on:
  push:
    paths:
      - 'ipv4cidr.txt'  # 当 CIDR 文件更新时触发
  workflow_dispatch:      # 允许手动触发

jobs:
  expand:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Expand CIDR
        run: python expand_cidr.py
        
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add iplist_full.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto expand CIDR [skip ci]"
          git push
